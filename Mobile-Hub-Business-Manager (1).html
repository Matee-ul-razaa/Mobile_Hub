<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Mobile Hub — Business Manager (KR ↔ PK)</title>
<style>
  :root{
    --bg:#f6f7f9; --surface:#ffffff; --surface-2:#f0f2f5;
    --text:#111827; --text-2:#4b5563; --text-3:#6b7280;
    --border:#e5e7eb; --border-2:#d1d5db;
    --brand:#1e40af; --brand-2:#1d4ed8; --brand-soft:#dbeafe;
    --green:#047857; --green-soft:#d1fae5;
    --red:#b91c1c; --red-soft:#fee2e2;
    --amber:#b45309; --amber-soft:#fef3c7;
    --purple:#6d28d9; --purple-soft:#ede9fe;
    --teal:#0f766e; --teal-soft:#ccfbf1;
    --radius:10px; --radius-lg:14px;
    --shadow:0 1px 2px rgba(17,24,39,.06), 0 1px 3px rgba(17,24,39,.06);
  }
  @media (prefers-color-scheme: dark){
    :root{
      --bg:#0b0f17; --surface:#111827; --surface-2:#1f2937;
      --text:#f3f4f6; --text-2:#d1d5db; --text-3:#9ca3af;
      --border:#374151; --border-2:#4b5563;
      --brand:#60a5fa; --brand-2:#3b82f6; --brand-soft:#1e3a8a;
      --green:#34d399; --green-soft:#064e3b;
      --red:#f87171; --red-soft:#7f1d1d;
      --amber:#fbbf24; --amber-soft:#78350f;
      --purple:#a78bfa; --purple-soft:#4c1d95;
      --teal:#2dd4bf; --teal-soft:#134e4a;
    }
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;font-size:14px;-webkit-font-smoothing:antialiased}
  a{color:var(--brand-2);text-decoration:none}
  button{font-family:inherit}

  /* App shell */
  .app{display:grid;grid-template-columns:240px 1fr;min-height:100vh}
  .sidebar{background:var(--surface);border-right:1px solid var(--border);padding:18px 14px;position:sticky;top:0;height:100vh;overflow-y:auto;display:flex;flex-direction:column}
  .brand{display:flex;align-items:center;gap:10px;margin-bottom:18px;padding:4px 6px}
  .brand-logo{width:34px;height:34px;border-radius:8px;background:linear-gradient(135deg,var(--brand),var(--purple));display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:15px}
  .brand-title{font-weight:600;font-size:15px;line-height:1.1}
  .brand-sub{font-size:11px;color:var(--text-3);margin-top:2px}
  .nav{display:flex;flex-direction:column;gap:2px;margin-top:8px}
  .nav button{display:flex;align-items:center;gap:10px;background:transparent;border:0;color:var(--text-2);padding:10px 12px;border-radius:8px;cursor:pointer;font-size:13.5px;text-align:left;width:100%}
  .nav button:hover{background:var(--surface-2);color:var(--text)}
  .nav button.active{background:var(--brand-soft);color:var(--brand);font-weight:600}
  .nav .icon{width:18px;height:18px;flex-shrink:0;display:inline-flex;align-items:center;justify-content:center}

  .main{padding:22px 28px 60px;min-width:0}
  .topbar{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:18px;flex-wrap:wrap}
  .topbar-logout{padding:6px 12px;font-size:12px;background:var(--surface);border:1px solid var(--border);border-radius:6px;cursor:pointer;color:var(--red);font-weight:500;display:inline-flex;align-items:center;gap:5px}
  .topbar-logout:hover{background:var(--red-soft);border-color:var(--red)}
  .page-title{font-size:22px;font-weight:600;margin:0}
  .page-sub{font-size:13px;color:var(--text-3);margin-top:3px}
  .topbar .right{display:flex;gap:8px;align-items:center;flex-wrap:wrap}

  /* Buttons */
  .btn{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border-radius:8px;border:1px solid var(--border);background:var(--surface);color:var(--text);cursor:pointer;font-size:13px;font-weight:500;transition:all .15s}
  .btn:hover{border-color:var(--border-2);background:var(--surface-2)}
  .btn-primary{background:var(--brand);border-color:var(--brand);color:#fff}
  .btn-primary:hover{background:var(--brand-2);border-color:var(--brand-2)}
  .btn-danger{background:var(--surface);color:var(--red);border-color:var(--border)}
  .btn-danger:hover{background:var(--red-soft);border-color:var(--red)}
  .btn-sm{padding:5px 10px;font-size:12px}
  .btn-icon{padding:6px 8px}

  /* Cards */
  .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:18px;box-shadow:var(--shadow)}
  .card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;gap:12px;flex-wrap:wrap}
  .card-title{font-size:15px;font-weight:600;margin:0}

  /* KPI grid */
  .kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin-bottom:18px}
  .kpi{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px}
  .kpi-label{font-size:12px;color:var(--text-3);font-weight:500;text-transform:uppercase;letter-spacing:.04em}
  .kpi-value{font-size:22px;font-weight:600;margin-top:6px;line-height:1.2}
  .kpi-sub{font-size:11.5px;color:var(--text-3);margin-top:4px}
  .kpi-value.pos{color:var(--green)}
  .kpi-value.neg{color:var(--red)}
  .kpi-value.brand{color:var(--brand)}
  .kpi-value.purple{color:var(--purple)}

  /* Tables */
  .table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;border-radius:8px;border:1px solid var(--border)}
  table{width:100%;border-collapse:collapse;font-size:13px;min-width:500px}
  th,td{text-align:left;padding:10px 12px;border-bottom:1px solid var(--border);white-space:nowrap}
  th{background:var(--surface-2);font-weight:600;font-size:12px;color:var(--text-2);text-transform:uppercase;letter-spacing:.03em;position:sticky;top:0}
  tbody tr:hover{background:var(--surface-2)}
  tbody tr:last-child td{border-bottom:0}
  td.num, th.num{text-align:right;font-variant-numeric:tabular-nums}
  .empty{padding:30px;text-align:center;color:var(--text-3);font-size:13px}

  /* Badges */
  .badge{display:inline-block;padding:3px 9px;border-radius:999px;font-size:11px;font-weight:600}
  .badge-green{background:var(--green-soft);color:var(--green)}
  .badge-red{background:var(--red-soft);color:var(--red)}
  .badge-amber{background:var(--amber-soft);color:var(--amber)}
  .badge-brand{background:var(--brand-soft);color:var(--brand)}
  .badge-purple{background:var(--purple-soft);color:var(--purple)}
  .badge-teal{background:var(--teal-soft);color:var(--teal)}
  .badge-gray{background:var(--surface-2);color:var(--text-2)}

  /* Forms / Modals */
  .modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.55);display:none;align-items:center;justify-content:center;padding:16px;z-index:100}
  .modal-bg.show{display:flex}
  .modal{background:var(--surface);border-radius:var(--radius-lg);max-width:520px;width:100%;max-height:90vh;overflow-y:auto;padding:22px;border:1px solid var(--border)}
  .modal h3{margin:0 0 14px;font-size:17px}
  .form-row{display:flex;flex-direction:column;gap:6px;margin-bottom:12px}
  .form-row label{font-size:12px;color:var(--text-2);font-weight:500}
  .form-row input,.form-row select,.form-row textarea{
    background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:9px 11px;font-size:14px;color:var(--text);font-family:inherit;width:100%
  }
  .form-row input:focus,.form-row select:focus,.form-row textarea:focus{outline:none;border-color:var(--brand)}
  .form-row textarea{min-height:70px;resize:vertical}
  .form-row-2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .modal-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:18px;flex-wrap:wrap}

  /* Dashboard charts */
  .chart-grid{display:grid;grid-template-columns:2fr 1fr;gap:14px;margin-bottom:14px}
  @media (max-width:900px){ .chart-grid{grid-template-columns:1fr} }
  .chart-box{height:280px;position:relative}
  .chart-box.small{height:220px}

  /* Investor cards */
  .inv-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:12px}
  .inv-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px}
  .inv-card h4{margin:0 0 4px;font-size:15px}
  .inv-card .inv-meta{font-size:12px;color:var(--text-3)}
  .inv-card .inv-stats{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-top:12px;font-size:12px}
  .inv-stat-label{color:var(--text-3)}
  .inv-stat-val{font-weight:600;font-size:13px;margin-top:2px}
  .inv-card .actions{display:flex;gap:6px;margin-top:12px;flex-wrap:wrap}

  /* Mobile */
  .menu-toggle{display:none;background:none;border:0;color:var(--text);font-size:22px;cursor:pointer;padding:6px}
  @media (max-width:780px){
    .app{grid-template-columns:1fr}
    .sidebar{position:fixed;left:-260px;width:240px;z-index:90;transition:left .25s;box-shadow:4px 0 16px rgba(0,0,0,.2)}
    .sidebar.open{left:0}
    .menu-toggle{display:inline-flex}
    .main{padding:16px}
    .page-title{font-size:18px}
    .backdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:80}
    .backdrop.show{display:block}
  }
  @media (max-width:480px){
    .kpi-value{font-size:18px}
    th,td{padding:8px 10px}
    .form-row-2{grid-template-columns:1fr}
  }

  /* Utility */
  .pill-filter{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
  .pill-filter button{background:var(--surface);border:1px solid var(--border);padding:6px 12px;border-radius:999px;font-size:12px;cursor:pointer;color:var(--text-2)}
  .pill-filter button.active{background:var(--brand);color:#fff;border-color:var(--brand)}
  .inline-actions{display:flex;gap:4px}
  .muted{color:var(--text-3)}
  .text-green{color:var(--green)}
  .text-red{color:var(--red)}
  .sep{height:1px;background:var(--border);margin:14px 0}

  /* Login screen */
  .login-screen{position:fixed;inset:0;background:linear-gradient(135deg,#1e3a8a,#6d28d9);display:flex;align-items:center;justify-content:center;padding:20px;z-index:1000}
  .login-box{background:var(--surface);border-radius:16px;padding:32px 28px;width:100%;max-width:400px;box-shadow:0 20px 50px rgba(0,0,0,.3)}
  .login-logo{width:56px;height:56px;border-radius:12px;background:linear-gradient(135deg,#1e40af,#6d28d9);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:22px;margin:0 auto 14px}
  .login-title{text-align:center;font-size:22px;font-weight:600;margin:0 0 4px}
  .login-sub{text-align:center;font-size:13px;color:var(--text-3);margin-bottom:24px}
  .user-picker{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:18px}
  .user-card{background:var(--surface-2);border:2px solid transparent;border-radius:10px;padding:14px 10px;cursor:pointer;text-align:center;transition:all .15s}
  .user-card:hover{border-color:var(--border-2)}
  .user-card.selected{border-color:var(--brand);background:var(--brand-soft)}
  .user-card .avatar{width:44px;height:44px;border-radius:50%;margin:0 auto 8px;display:flex;align-items:center;justify-content:center;font-weight:600;font-size:16px;color:#fff}
  .user-card .avatar.n{background:#0f766e}
  .user-card .avatar.b{background:#6d28d9}
  .user-card .name{font-size:13px;font-weight:500}
  .user-card .role{font-size:11px;color:var(--text-3);margin-top:2px}
  .login-error{background:var(--red-soft);color:var(--red);padding:10px 12px;border-radius:8px;font-size:12.5px;margin-bottom:12px}
  .login-footer{text-align:center;font-size:11px;color:var(--text-3);margin-top:18px}

  /* User chip in sidebar */
  .user-chip{background:var(--surface-2);border-radius:10px;padding:10px 12px;margin-top:12px;display:flex;align-items:center;gap:10px;flex-shrink:0}
  .user-chip .avatar{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:13px;font-weight:600;flex-shrink:0}
  .user-chip .avatar.n{background:#0f766e}
  .user-chip .avatar.b{background:#6d28d9}
  .user-chip .u-name{font-size:13px;font-weight:500;line-height:1.1}
  .user-chip .u-role{font-size:11px;color:var(--text-3);margin-top:2px}
  .user-chip .logout-btn{padding:6px 10px;font-size:11.5px;background:var(--surface);border:1px solid var(--border);border-radius:6px;cursor:pointer;color:var(--red);font-weight:500;white-space:nowrap}
  .user-chip .logout-btn:hover{background:var(--red-soft);border-color:var(--red)}
  .nav{flex:1;min-height:0;overflow-y:auto}

  /* AI Chat */
  .ai-wrap{display:grid;grid-template-columns:1fr;gap:14px;height:calc(100vh - 140px);min-height:500px}
  .ai-chat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);display:flex;flex-direction:column;overflow:hidden;box-shadow:var(--shadow)}
  .ai-header{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;flex-shrink:0}
  .ai-status{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--text-3)}
  .ai-dot{width:8px;height:8px;border-radius:50%;background:var(--green)}
  .ai-dot.off{background:var(--text-3)}
  .ai-messages{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px;min-height:0}
  .ai-msg{max-width:85%;padding:10px 14px;border-radius:12px;font-size:14px;line-height:1.5;word-wrap:break-word}
  .ai-msg.user{align-self:flex-end;background:var(--brand);color:#fff;border-bottom-right-radius:4px}
  .ai-msg.bot{align-self:flex-start;background:var(--surface-2);color:var(--text);border-bottom-left-radius:4px}
  .ai-msg.bot.error{background:var(--red-soft);color:var(--red)}
  .ai-msg .badge-src{display:inline-block;margin-top:6px;font-size:10px;padding:2px 8px;border-radius:999px;background:rgba(0,0,0,0.08)}
  .ai-msg.bot pre{background:rgba(0,0,0,0.06);padding:8px;border-radius:6px;font-size:12px;overflow-x:auto;margin:6px 0}
  .ai-msg.bot strong{font-weight:600}
  .ai-quick{padding:10px 16px;border-top:1px solid var(--border);display:flex;gap:6px;flex-wrap:wrap;flex-shrink:0;background:var(--surface-2)}
  .ai-quick button{background:var(--surface);border:1px solid var(--border);padding:6px 12px;border-radius:999px;font-size:12px;cursor:pointer;color:var(--text-2);white-space:nowrap}
  .ai-quick button:hover{background:var(--brand-soft);color:var(--brand);border-color:var(--brand)}
  .ai-input-row{padding:12px 16px;border-top:1px solid var(--border);display:flex;gap:8px;align-items:flex-end;flex-shrink:0}
  .ai-input-row textarea{flex:1;min-height:40px;max-height:120px;padding:10px 12px;border:1px solid var(--border);border-radius:10px;font-size:14px;font-family:inherit;background:var(--surface);color:var(--text);resize:none}
  .ai-input-row textarea:focus{outline:none;border-color:var(--brand)}
  .ai-lang-toggle{display:flex;background:var(--surface-2);border-radius:8px;padding:3px;gap:2px}
  .ai-lang-toggle button{background:transparent;border:0;padding:5px 10px;border-radius:6px;font-size:11.5px;cursor:pointer;color:var(--text-2);font-weight:500}
  .ai-lang-toggle button.active{background:var(--surface);color:var(--brand);box-shadow:0 1px 2px rgba(0,0,0,.08)}
  .typing-indicator{display:inline-flex;gap:3px;align-items:center}
  .typing-indicator span{width:6px;height:6px;border-radius:50%;background:var(--text-3);animation:typing 1.4s infinite}
  .typing-indicator span:nth-child(2){animation-delay:.2s}
  .typing-indicator span:nth-child(3){animation-delay:.4s}
  @keyframes typing{0%,60%,100%{opacity:.3;transform:translateY(0)}30%{opacity:1;transform:translateY(-3px)}}
  @media (max-width:780px){
    .ai-wrap{height:calc(100vh - 110px)}
    .ai-msg{max-width:92%}
  }
</style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div class="login-screen" id="loginScreen">
  <div class="login-box">
    <div class="login-logo">MH</div>
    <h1 class="login-title">Mobile Hub</h1>
    <div class="login-sub">Sign in to continue</div>

    <div class="user-picker">
      <div class="user-card" data-user="nadeem" onclick="pickUser('nadeem')">
        <div class="avatar n">N</div>
        <div class="name">Nadeem</div>
        <div class="role">Admin</div>
      </div>
      <div class="user-card" data-user="bilawal" onclick="pickUser('bilawal')">
        <div class="avatar b">B</div>
        <div class="name">Bilawal</div>
        <div class="role">Admin</div>
      </div>
    </div>

    <div id="loginError" style="display:none" class="login-error"></div>

    <div class="form-row">
      <label>Password</label>
      <input id="loginPwd" type="password" placeholder="Enter password" onkeydown="if(event.key==='Enter')doLogin()">
    </div>

    <button class="btn btn-primary" style="width:100%;justify-content:center" onclick="doLogin()">Sign in</button>

    <div class="login-footer">Default password for first-time login: <code>admin</code> · change it in Settings after sign-in</div>
    <div style="text-align:center;margin-top:10px">
      <a href="#" onclick="resetLoginFromScreen();return false" style="color:var(--text-3);font-size:11.5px;text-decoration:underline">Trouble signing in? Reset to default password</a>
    </div>
  </div>
</div>

<div class="backdrop" id="backdrop" onclick="toggleMenu(false)"></div>

<div class="app" id="app" style="display:none">
  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <div class="brand">
      <div class="brand-logo">MH</div>
      <div>
        <div class="brand-title">Mobile Hub</div>
        <div class="brand-sub">Korea → Pakistan Exports</div>
      </div>
    </div>
    <nav class="nav" id="nav">
      <button data-page="dashboard" class="active"><span class="icon">📊</span> Dashboard</button>
      <button data-page="inventory"><span class="icon">📦</span> Inventory</button>
      <button data-page="sales"><span class="icon">💼</span> Sales</button>
      <button data-page="shipments"><span class="icon">📮</span> Shipments</button>
      <button data-page="expenses"><span class="icon">💸</span> Expenses</button>
      <button data-page="cashflow"><span class="icon">💵</span> Cash In / Out</button>
      <button data-page="hawala"><span class="icon">🔁</span> Fazi Cash</button>
      <button data-page="investors"><span class="icon">👥</span> Investors</button>
      <button data-page="owner"><span class="icon">🧑‍💼</span> My Investment</button>
      <button data-page="payouts"><span class="icon">📅</span> Investor Payouts</button>
      <button data-page="capital"><span class="icon">📈</span> Capital & Profit</button>
      <button data-page="ai"><span class="icon">🤖</span> AI Assistant</button>
      <button data-page="activity"><span class="icon">📝</span> Activity Log</button>
      <button data-page="settings"><span class="icon">⚙️</span> Settings / Backup</button>
    </nav>
    <div class="user-chip" id="userChip"></div>
  </aside>

  <!-- MAIN -->
  <main class="main">
    <div class="topbar">
      <div style="display:flex;align-items:center;gap:10px">
        <button class="menu-toggle" onclick="toggleMenu()">☰</button>
        <div>
          <h1 class="page-title" id="pageTitle">Dashboard</h1>
          <div class="page-sub" id="pageSub">Overview of your business</div>
        </div>
      </div>
      <div class="right" style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
        <div id="pageActions" style="display:flex;gap:8px;align-items:center;flex-wrap:wrap"></div>
        <button type="button" class="topbar-logout" data-action="logout" onclick="window.logout && window.logout()" title="Sign out">⎋ Sign out</button>
      </div>
    </div>
    <div id="content"></div>
  </main>
</div>

<!-- MODAL -->
<div class="modal-bg" id="modalBg">
  <div class="modal" id="modal"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script>
/* =========================================================
   Mobile Hub — Korea → Pakistan Export Business Manager
   Single-file app. All data stored in browser localStorage.
   Currency: KRW (working) · PKR (reference for hawala/investors)
   ========================================================= */

const STORE_KEY = 'mobilex_v1';
const AUTH_KEY = 'mobilehub_auth_v1';
const SESSION_KEY = 'mobilehub_session_v1';
const fmtKRW = n => '₩' + (Number(n)||0).toLocaleString('en-US', {maximumFractionDigits:0});
const fmtNum = n => (Number(n)||0).toLocaleString('en-US', {maximumFractionDigits:0});
const todayISO = () => new Date().toISOString().slice(0,10);
const nowISO = () => new Date().toISOString();
const ym = d => (d||todayISO()).slice(0,7);
const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2,7);

// HTML escapers — for safely embedding user/dynamic strings into HTML and attributes
function escHtml(s){
  return String(s==null?'':s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
function escAttr(s){ return escHtml(s); }

// -------------------- AUTH --------------------
// Tiny hash (not cryptographic — for basic obscurity only).
// If you need true security, the passwords belong on a server, not in localStorage.
function hashPwd(s){
  let h = 5381;
  for(let i=0;i<s.length;i++) h = ((h<<5)+h) + s.charCodeAt(i);
  return (h>>>0).toString(36);
}
function loadAuth(){
  let parsed = null;
  try{
    const raw = localStorage.getItem(AUTH_KEY);
    if(raw) parsed = JSON.parse(raw);
  }catch(e){}
  // Heal corrupted auth: if structure is invalid or missing either user, reset entire auth
  const ok = parsed && parsed.users
    && parsed.users.nadeem  && parsed.users.nadeem.pwdHash
    && parsed.users.bilawal && parsed.users.bilawal.pwdHash;
  if(ok) return parsed;
  // Default: two admins with password "admin"
  const def = {
    users: {
      nadeem:  { name:'Nadeem',  role:'Admin', pwdHash: hashPwd('admin') },
      bilawal: { name:'Bilawal', role:'Admin', pwdHash: hashPwd('admin') },
    }
  };
  localStorage.setItem(AUTH_KEY, JSON.stringify(def));
  return def;
}
function saveAuth(){ localStorage.setItem(AUTH_KEY, JSON.stringify(auth)); }

let currentUser = null; // e.g. 'nadeem' or 'bilawal'

function pickUser(u){
  document.querySelectorAll('.user-card').forEach(c=>c.classList.toggle('selected', c.dataset.user===u));
  document.getElementById('loginPwd').focus();
}
function doLogin(){
  const picked = document.querySelector('.user-card.selected');
  const pwdEl = document.getElementById('loginPwd');
  const pwd = pwdEl ? pwdEl.value : '';
  const err = document.getElementById('loginError');
  err.style.display='none';
  if(!picked){
    err.textContent='⚠ Please tap Nadeem or Bilawal first to select your account.';
    err.style.display='block';
    return;
  }
  const u = picked.dataset.user;
  if(!auth || !auth.users || !auth.users[u]){
    err.textContent='⚠ Account data missing. Tap "Trouble signing in?" below to reset.';
    err.style.display='block';
    return;
  }
  if(!pwd){
    err.textContent='⚠ Please enter your password.';
    err.style.display='block';
    return;
  }
  if(hashPwd(pwd) !== auth.users[u].pwdHash){
    err.textContent='✗ Incorrect password for ' + auth.users[u].name + '. Default is "admin" (lowercase).';
    err.style.display='block';
    pwdEl.value=''; pwdEl.focus();
    return;
  }
  currentUser = u;
  try {
    sessionStorage.setItem(SESSION_KEY, u);
    localStorage.setItem(SESSION_KEY, u);
  } catch(e){}
  try { logActivity('login','auth',`${userName(u)} signed in`); saveData(); } catch(e){}
  showApp();
}

function resetLoginFromScreen(){
  if(!confirm('Reset both passwords back to "admin"? Your business data stays untouched.')) return;
  try {
    localStorage.removeItem(AUTH_KEY);
    auth = loadAuth();
    const err = document.getElementById('loginError');
    err.style.color = 'var(--green)';
    err.textContent = '✓ Passwords reset to "admin". Pick a user and try again.';
    err.style.display='block';
    setTimeout(()=>{ err.style.color=''; }, 50);
  } catch(e){
    alert('Reset failed: ' + e.message);
  }
}
function logout(){
  // Try confirm — but if it's suppressed by the browser, just proceed.
  let proceed = true;
  try { proceed = window.confirm('Sign out?'); } catch(e){ /* some mobile WebViews throw — just proceed */ }
  if(!proceed) return;
  try {
    currentUser = null;
    sessionStorage.removeItem(SESSION_KEY);
    localStorage.removeItem(SESSION_KEY);
    const app = document.getElementById('app');
    const loginScreen = document.getElementById('loginScreen');
    if(app) app.style.display='none';
    if(loginScreen) loginScreen.style.display='flex';
    const pwdEl = document.getElementById('loginPwd');
    if(pwdEl) pwdEl.value='';
    document.querySelectorAll('.user-card').forEach(c=>c.classList.remove('selected'));
  } catch(e){
    // Last-resort fallback: hard reload, which forces re-auth via session check
    try { window.location.reload(); } catch(_){}
  }
}
function showApp(){
  document.getElementById('loginScreen').style.display='none';
  document.getElementById('app').style.display='grid';
  const u = auth.users[currentUser];
  const initial = u.name[0];
  const cls = currentUser === 'nadeem' ? 'n' : 'b';
  const chip = document.getElementById('userChip');
  chip.innerHTML = `
    <div class="avatar ${cls}">${initial}</div>
    <div style="flex:1;min-width:0">
      <div class="u-name">${u.name}</div>
      <div class="u-role">${u.role}</div>
    </div>
    <button type="button" class="logout-btn" data-action="logout">Sign out</button>
  `;
  route(currentPage || 'dashboard');
}

// Global event delegation — catches clicks on ANY element with data-action="logout",
// no matter when it's added to the DOM. This is bulletproof against innerHTML rewrites.
document.addEventListener('click', function(e){
  const target = e.target.closest('[data-action="logout"]');
  if(target){
    e.preventDefault();
    e.stopPropagation();
    if(window.logout) window.logout();
    else console.error('[Mobile Hub] logout function not yet defined');
  }
});

// User-stamping: attach creator/updater + timestamps to any saved record
function stamp(obj, isNew){
  const now = nowISO();
  if(isNew || !obj.createdBy){
    obj.createdBy = currentUser;
    obj.createdAt = now;
  }
  obj.updatedBy = currentUser;
  obj.updatedAt = now;
  return obj;
}
function userName(key){ return (auth.users[key] && auth.users[key].name) || '—'; }
function userBadge(key){
  if(!key) return '<span class="muted" style="font-size:11px">—</span>';
  const cls = key==='nadeem'?'badge-teal':key==='bilawal'?'badge-purple':'badge-gray';
  return `<span class="badge ${cls}" style="font-size:10px">${userName(key)}</span>`;
}

// Activity log — records every meaningful change
function logActivity(action, entity, detail){
  if(!data.activity) data.activity = [];
  data.activity.push({
    id: uid(),
    at: nowISO(),
    user: currentUser,
    action,       // 'create' | 'update' | 'delete' | 'login' | 'import'
    entity,       // 'inventory' | 'sale' | 'hawala' | ...
    detail,       // short human-readable description
  });
  // Keep last 1000 entries max
  if(data.activity.length>1000) data.activity = data.activity.slice(-1000);
}

// -------------------- Aggregations --------------------
function agg(){
  const invValue = data.inventory.reduce((a,x)=> a + Math.max(0,(x.qty - x.soldQty)) * x.costPerUnit, 0);
  const invUnits = data.inventory.reduce((a,x)=> a + Math.max(0,(x.qty - x.soldQty)), 0);
  const salesRev = data.sales.reduce((a,x)=> a + x.qty * x.pricePerUnit, 0);
  const salesCOGS = data.sales.reduce((a,x)=>{
    const item = data.inventory.find(i=>i.model===x.model);
    return a + x.qty * (item ? item.costPerUnit : 0);
  }, 0);
  const grossProfit = salesRev - salesCOGS;
  const totalExp = data.expenses.reduce((a,x)=>a+x.amount,0);
  const netProfit = grossProfit - totalExp;
  const cashIn = data.cashflow.filter(c=>c.type==='in').reduce((a,x)=>a+x.amount,0);
  const cashOut = data.cashflow.filter(c=>c.type==='out').reduce((a,x)=>a+x.amount,0);
  const hawalaIn = data.hawala.reduce((a,x)=>a+(+x.amountKRW||0),0);
  const hawalaPKR = data.hawala.reduce((a,x)=>a+(+x.amountPKR||0),0);
  const hawalaDiscount = data.hawala.reduce((a,x)=>a+(+x.discountKRW||0),0);
  const pendingReceivable = data.sales.reduce((a,x)=> a + Math.max(0, (x.qty*x.pricePerUnit) - (x.received||0)), 0);
  const totalCapital = data.investors.reduce((a,x)=>a+(+x.capital||0),0);
  const totalCapitalPKR = data.investors.reduce((a,x)=>a+(+x.capitalPKR||0),0);
  const ownerCapital = (data.ownerInvestments||[]).reduce((a,x)=>a+(+x.amountKRW||0),0);
  const ownerCapitalPKR = (data.ownerInvestments||[]).reduce((a,x)=>a+(+x.amountPKR||0),0);
  const totalMonthly = data.investors.reduce((a,x)=>a+(+x.monthlyPayout||0),0);
  const totalMonthlyPKR = data.investors.reduce((a,x)=>a+(+x.monthlyPayoutPKR||0),0);
  const totalPaid = data.payouts.reduce((a,x)=>a+(+x.amount||0),0);
  const totalPaidPKR = data.payouts.reduce((a,x)=>a+(+x.amountPKR||0),0);
  const cashInHand = cashIn - cashOut + hawalaIn + ownerCapital - totalExp - totalPaid;

  // -------- REALIZED PROFIT --------
  // Profit is only "real" once cash has actually come in (via hawala/received).
  // For each sale, we compute the received portion's share of profit.
  let realizedRevenue = 0, realizedCOGS = 0;
  data.sales.forEach(s=>{
    const total = s.qty * s.pricePerUnit;
    if(total<=0) return;
    const received = Math.min(s.received||0, total);
    const ratio = received / total; // fraction of sale that has been paid
    realizedRevenue += received;
    const item = data.inventory.find(i=>i.model===s.model);
    const costPerUnit = item ? item.costPerUnit : 0;
    realizedCOGS += s.qty * costPerUnit * ratio;
  });
  const realizedGrossProfit = realizedRevenue - realizedCOGS - hawalaDiscount;
  const realizedNetProfit = realizedGrossProfit - totalExp - totalPaid;

  // Total capital pool = investor capital + owner capital + retained profit (if positive)
  const retainedProfit = realizedNetProfit; // can be negative (loss eats into capital)
  const totalCapitalPool = totalCapital + ownerCapital + retainedProfit;

  return {invValue,invUnits,salesRev,salesCOGS,grossProfit,totalExp,netProfit,
    cashIn,cashOut,hawalaIn,hawalaPKR,hawalaDiscount,pendingReceivable,
    totalCapital,totalCapitalPKR,ownerCapital,ownerCapitalPKR,
    totalMonthly,totalMonthlyPKR,totalPaid,totalPaidPKR,
    cashInHand,
    realizedRevenue,realizedCOGS,realizedGrossProfit,realizedNetProfit,
    retainedProfit,totalCapitalPool};
}

function renderRecent(){
  const rows = [];
  data.sales.slice(-5).forEach(s=>rows.push({date:s.date,type:'Sale',detail:`${s.buyer} — ${s.qty}× ${s.model}`,amount:s.qty*s.pricePerUnit,cls:'pos'}));
  data.expenses.slice(-5).forEach(e=>rows.push({date:e.date,type:'Expense',detail:`${e.category}${e.note?' — '+e.note:''}`,amount:-e.amount,cls:'neg'}));
  data.hawala.slice(-5).forEach(h=>rows.push({date:h.date,type:'Fazi Cash In',detail:`From ${h.buyer} (via ${h.receiverName})`,amount:h.amountKRW,cls:'pos'}));
  (data.ownerInvestments||[]).slice(-5).forEach(o=>rows.push({date:o.date,type:'My Investment',detail:o.source||'Own money',amount:+o.amountKRW||0,cls:'pos'}));
  data.payouts.slice(-5).forEach(p=>{
    const inv = data.investors.find(i=>i.id===p.investorId);
    rows.push({date:p.date,type:'Payout',detail:inv?inv.name:'Investor',amount:-p.amount,cls:'neg'});
  });
  rows.sort((a,b)=>b.date.localeCompare(a.date));
  const tbody = document.getElementById('recentRows');
  if(!rows.length){ tbody.innerHTML = '<tr><td colspan="4" class="empty">No activity yet</td></tr>'; return; }
  tbody.innerHTML = rows.slice(0,10).map(r=>`
    <tr><td>${r.date}</td>
    <td><span class="badge badge-${r.type==='Sale'?'green':r.type==='Fazi Cash In'?'teal':r.type==='Payout'?'purple':r.type==='My Investment'?'brand':'amber'}">${r.type}</span></td>
    <td>${r.detail}</td>
    <td class="num text-${r.amount>=0?'green':'red'}">${r.amount>=0?'+':''}${fmtKRW(r.amount)}</td></tr>
  `).join('');
}

    grid: dark ? '#374151' : '#e5e7eb',
    palette: ['#1e40af','#047857','#b45309','#6d28d9','#0f766e','#b91c1c','#db2777','#0891b2']

function drawCashChart(){
  const months = [];
  const d = new Date();
  for(let i=5;i>=0;i--){
    const dd = new Date(d.getFullYear(), d.getMonth()-i, 1);
    months.push(dd.toISOString().slice(0,7));
  }
  const inflow = months.map(m=>{
    const hawala = data.hawala.filter(h=>ym(h.date)===m).reduce((a,x)=>a+x.amountKRW,0);
    const ci = data.cashflow.filter(c=>c.type==='in'&&ym(c.date)===m).reduce((a,x)=>a+x.amount,0);
    const own = (data.ownerInvestments||[]).filter(o=>ym(o.date)===m).reduce((a,x)=>a+(+x.amountKRW||0),0);
    return hawala + ci + own;
  });
  const outflow = months.map(m=>{
    const exp = data.expenses.filter(e=>ym(e.date)===m).reduce((a,x)=>a+x.amount,0);
    const co = data.cashflow.filter(c=>c.type==='out'&&ym(c.date)===m).reduce((a,x)=>a+x.amount,0);
    const po = data.payouts.filter(p=>ym(p.date)===m).reduce((a,x)=>a+x.amount,0);
    return exp + co + po;
  });
  const c = chartColors();
  if(chartCash) chartCash.destroy();
  chartCash = new Chart(document.getElementById('chartCash'),{

function saleSave(id){
  const obj = {
    id: id || uid(),
    date: document.getElementById('f_date').value,
    buyer: document.getElementById('f_buyer').value.trim(),
    model: document.getElementById('f_model').value,
    qty: +document.getElementById('f_qty').value || 0,
    pricePerUnit: +document.getElementById('f_price').value || 0,
    received: +document.getElementById('f_recv').value || 0,
    shipmentId: (document.getElementById('f_ship') && document.getElementById('f_ship').value) || '',
    notes: document.getElementById('f_notes').value.trim(),
  };
  if(!obj.buyer||!obj.model||!obj.qty){ alert('Buyer, model and qty required'); return; }
  // Update inventory sold count
  const prev = id ? data.sales.find(x=>x.id===id) : null;
  if(prev){
    const prevItem = data.inventory.find(i=>i.model===prev.model);
    if(prevItem) prevItem.soldQty = Math.max(0, prevItem.soldQty - prev.qty);
  }
  const item = data.inventory.find(i=>i.model===obj.model);
  if(item) item.soldQty = (item.soldQty||0) + obj.qty;

  if(id){
    const i = data.sales.findIndex(x=>x.id===id);
    stamp(Object.assign(data.sales[i], obj), false);
    logActivity('update','sale',`${obj.buyer} — ${obj.qty}× ${obj.model}`);
  } else {
    stamp(obj, true);
    data.sales.push(obj);
    logActivity('create','sale',`${obj.buyer} — ${obj.qty}× ${obj.model}`);
  }
  saveData(); closeModal(); route('sales');
}
function saleDel(id){
  if(!confirm('Delete this sale?')) return;
  const s = data.sales.find(x=>x.id===id);
  if(s){
    const item = data.inventory.find(i=>i.model===s.model); if(item) item.soldQty = Math.max(0, item.soldQty - s.qty);
    logActivity('delete','sale',`${s.buyer} — ${s.qty}× ${s.model}`);
  }
  data.sales = data.sales.filter(x=>x.id!==id);
  saveData(); route('sales');
}

function shipSave(id){
  if(!data.shipments) data.shipments = [];
  const obj = {
    id: id || uid(),
    date: document.getElementById('f_date').value,
    ref: document.getElementById('f_ref').value.trim(),
    courier: document.getElementById('f_courier').value,
    status: document.getElementById('f_status').value,
    trackingNumber: document.getElementById('f_track').value.trim(),
    arrivedDate: document.getElementById('f_arrived').value,
    shippingCost: +document.getElementById('f_cost').value || 0,
    notes: document.getElementById('f_notes').value.trim(),
  };
  if(!obj.date){ alert('Date required'); return; }

  // Read which sales are checked
  const picks = [...document.querySelectorAll('.ship-sale-pick')];
  const pickedIds = picks.filter(c=>c.checked).map(c=>c.dataset.saleId);

  // For each existing sale, decide whether to link or unlink
  const existing = id ? (data.shipments||[]).find(x=>x.id===id) : null;
  const wasLinkedSet = new Set(data.sales.filter(s=>s.shipmentId===id).map(s=>s.id));

  if(id){
    stamp(Object.assign(existing, obj), false);
    logActivity('update','shipment',`${obj.ref||obj.date}`);
  } else {
    stamp(obj, true);
    data.shipments.push(obj);
    logActivity('create','shipment',`${obj.ref||obj.date} via ${obj.courier}`);
  }

  // Update sale links
  data.sales.forEach(s=>{
    const isPicked = pickedIds.includes(s.id);
    const wasLinked = wasLinkedSet.has(s.id);
    if(isPicked && s.shipmentId !== obj.id){ s.shipmentId = obj.id; }
    else if(!isPicked && wasLinked){ s.shipmentId = ''; }
  });

  // Auto-create / update shipping expense
  // Find existing shipping expense linked to this shipment
  const expRef = `SHIP:${obj.id}`;
  let expense = data.expenses.find(e=>e.note && e.note.startsWith(expRef));
  if(obj.shippingCost > 0){
    if(expense){
      expense.amount = obj.shippingCost;
      expense.date = obj.date;
      expense.note = `${expRef} ${obj.ref?'· '+obj.ref:''}${obj.courier?' · '+obj.courier:''}`;
      stamp(expense, false);
    } else {
      const newExp = stamp({
        id: uid(),
        date: obj.date,
        category: 'Shipping',
        amount: obj.shippingCost,
        note: `${expRef} ${obj.ref?'· '+obj.ref:''}${obj.courier?' · '+obj.courier:''}`,
      }, true);
      data.expenses.push(newExp);
    }
  } else if(expense){
    // Cost was set to 0 / cleared — remove the auto-created expense
    data.expenses = data.expenses.filter(e=>e.id!==expense.id);
  }

  saveData(); closeModal(); route('shipments');
}

function shipDel(id){
  if(!confirm('Delete this shipment? Linked sales will be unlinked (not deleted). The auto-created shipping expense will also be removed.')) return;
  const sh = (data.shipments||[]).find(x=>x.id===id);
  // Unlink sales
  data.sales.forEach(s=>{ if(s.shipmentId===id) s.shipmentId=''; });
  // Remove auto-shipping expense
  const expRef = `SHIP:${id}`;
  data.expenses = data.expenses.filter(e=>!(e.note && e.note.startsWith(expRef)));
  // Remove shipment
  data.shipments = (data.shipments||[]).filter(x=>x.id!==id);
  if(sh) logActivity('delete','shipment',`${sh.ref||sh.date}`);
  saveData(); route('shipments');
}

// -------------------- CAPITAL & PROFIT --------------------
pages.capital = () => {
  const a = agg();
  // Monthly realized profit trend (last 6 months, rough: hawala-based)
  const months = [];
  const d = new Date();
  for(let i=5;i>=0;i--){
    const dd = new Date(d.getFullYear(), d.getMonth()-i, 1);
    months.push(dd.toISOString().slice(0,7));
  }
  // Per-month: hawala received, discounts, expenses, payouts; we approximate per-month realized profit
  // Note: cost of goods for hawala is tricky to attribute per month exactly, so we show cash-basis monthly profit:
  //   monthlyProfit ≈ hawalaReceived − proportionalCOGS − discounts − expenses − payouts
  // We attribute COGS in proportion to hawala received vs total sales cost.
  const totalSalesValue = data.sales.reduce((s,x)=>s+x.qty*x.pricePerUnit,0);
  const cogsPerKRWReceived = totalSalesValue ? (a.salesCOGS / totalSalesValue) : 0;

  const monthlyData = months.map(m=>{
    const hIn = data.hawala.filter(h=>ym(h.date)===m).reduce((s,x)=>s+(+x.amountKRW||0),0);
    const hDisc = data.hawala.filter(h=>ym(h.date)===m).reduce((s,x)=>s+(+x.discountKRW||0),0);
    const exp = data.expenses.filter(e=>ym(e.date)===m).reduce((s,x)=>s+x.amount,0);
    const pay = data.payouts.filter(p=>ym(p.date)===m).reduce((s,x)=>s+(+x.amount||0),0);
    const approxCOGS = hIn * cogsPerKRWReceived;
    const profit = hIn - approxCOGS - hDisc - exp - pay;
    return {month:m, hIn, approxCOGS, hDisc, exp, pay, profit};
  });

  // Profit breakdown table rows
  const monthRows = monthlyData.map(r=>`
    <tr>
      <td>${r.month}</td>
      <td class="num text-green">+${fmtKRW(r.hIn)}</td>
      <td class="num text-red">−${fmtKRW(r.approxCOGS)}</td>
      <td class="num text-red">−${fmtKRW(r.hDisc)}</td>
      <td class="num text-red">−${fmtKRW(r.exp)}</td>
      <td class="num text-red">−${fmtKRW(r.pay)}</td>
      <td class="num ${r.profit>=0?'text-green':'text-red'}"><strong>${r.profit>=0?'+':''}${fmtKRW(r.profit)}</strong></td>
    </tr>`).join('');

  document.getElementById('content').innerHTML = `
    <div class="kpi-grid">
      <div class="kpi"><div class="kpi-label">Total Capital Pool</div>
        <div class="kpi-value purple">${fmtKRW(a.totalCapitalPool)}</div>
        <div class="kpi-sub">Working capital including profits</div></div>
      <div class="kpi"><div class="kpi-label">Investor Capital</div>
        <div class="kpi-value">${fmtKRW(a.totalCapital)}</div>
        <div class="kpi-sub">From ${data.investors.length} investors</div></div>
      <div class="kpi"><div class="kpi-label">My Own Investment</div>
        <div class="kpi-value brand">${fmtKRW(a.ownerCapital)}</div>
        <div class="kpi-sub">Your own money added</div></div>
      <div class="kpi"><div class="kpi-label">Retained Profit</div>
        <div class="kpi-value ${a.retainedProfit>=0?'pos':'neg'}">${a.retainedProfit>=0?'+':''}${fmtKRW(a.retainedProfit)}</div>
        <div class="kpi-sub">${(a.totalCapital+a.ownerCapital)?((a.retainedProfit/(a.totalCapital+a.ownerCapital))*100).toFixed(1):'0'}% growth on capital</div></div>
    </div>

    <div class="card" style="margin-bottom:14px">
      <div class="card-header"><h3 class="card-title">How your capital is built</h3></div>
      <div style="padding:8px 0">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
          <div style="flex:1;background:var(--surface-2);border-radius:999px;height:28px;overflow:hidden;display:flex">
            ${a.totalCapital>0?`<div style="background:#6d28d9;height:100%;width:${Math.max(0,Math.min(100, a.totalCapital/a.totalCapitalPool*100))}%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:11px;font-weight:500">${fmtKRW(a.totalCapital)}</div>`:''}
            ${a.ownerCapital>0?`<div style="background:#1e40af;height:100%;width:${Math.max(0,Math.min(100, a.ownerCapital/a.totalCapitalPool*100))}%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:11px;font-weight:500">${fmtKRW(a.ownerCapital)}</div>`:''}
            <div style="background:${a.retainedProfit>=0?'#047857':'#b91c1c'};height:100%;width:${Math.max(0,Math.min(100, Math.abs(a.retainedProfit)/a.totalCapitalPool*100))}%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:11px;font-weight:500">${a.retainedProfit>=0?'+':'−'}${fmtKRW(Math.abs(a.retainedProfit))}</div>

        <div style="display:flex;justify-content:space-between;font-size:12px;color:var(--text-3);flex-wrap:wrap;gap:6px">

          <span><span style="display:inline-block;width:10px;height:10px;background:#1e40af;border-radius:2px;margin-right:4px"></span>My investment</span>
          <span><span style="display:inline-block;width:10px;height:10px;background:${a.retainedProfit>=0?'#047857':'#b91c1c'};border-radius:2px;margin-right:4px"></span>${a.retainedProfit>=0?'Retained profit':'Loss'}</span>
          <span><strong style="color:var(--text)">Total: ${fmtKRW(a.totalCapitalPool)}</strong></span>
        </div>
      </div>
    </div>

    <div class="chart-grid">
      <div class="card">
        <div class="card-header"><h3 class="card-title">Realized Profit Calculation</h3>
          <div class="muted" style="font-size:11px">Based on cash actually received</div></div>
        <table style="min-width:auto">
          <tbody>
            <tr><td>Realized Revenue <span class="muted" style="font-size:11px">(from Fazi Cash / received)</span></td>
              <td class="num text-green"><strong>+${fmtKRW(a.realizedRevenue)}</strong></td></tr>
            <tr><td>Cost of Goods Sold <span class="muted" style="font-size:11px">(for received portion)</span></td>
              <td class="num text-red">−${fmtKRW(a.realizedCOGS)}</td></tr>
            <tr><td>Fazi Cash Discounts Given</td>
              <td class="num text-red">−${fmtKRW(a.hawalaDiscount)}</td></tr>
            <tr style="background:var(--surface-2)"><td><strong>Gross Realized Profit</strong></td>
              <td class="num ${a.realizedGrossProfit>=0?'text-green':'text-red'}"><strong>${fmtKRW(a.realizedGrossProfit)}</strong></td></tr>
            <tr><td>Total Expenses</td>
              <td class="num text-red">−${fmtKRW(a.totalExp)}</td></tr>
            <tr><td>Total Investor Payouts</td>
              <td class="num text-red">−${fmtKRW(a.totalPaid)}</td></tr>
            <tr style="background:var(--surface-2)"><td><strong>Net Retained Profit</strong></td>
              <td class="num ${a.retainedProfit>=0?'text-green':'text-red'}"><strong>${a.retainedProfit>=0?'+':''}${fmtKRW(a.retainedProfit)}</strong></td></tr>
          </tbody>
        </table>
      </div>

      <div class="card">
        <div class="card-header"><h3 class="card-title">Business Position Today</h3></div>
        <table style="min-width:auto">
          <tbody>
            <tr><td>Cash In Hand</td><td class="num"><strong>${fmtKRW(a.cashInHand)}</strong></td></tr>
            <tr><td>Inventory Value <span class="muted" style="font-size:11px">(stock remaining)</span></td><td class="num"><strong>${fmtKRW(a.invValue)}</strong></td></tr>
            <tr><td>Pending Receivable <span class="muted" style="font-size:11px">(not yet received)</span></td><td class="num"><strong>${fmtKRW(a.pendingReceivable)}</strong></td></tr>
            <tr style="background:var(--surface-2)"><td><strong>Total Business Assets</strong></td>
              <td class="num"><strong>${fmtKRW(a.cashInHand + a.invValue + a.pendingReceivable)}</strong></td></tr>
            <tr><td class="muted" style="font-size:12px">vs. Total Capital Pool</td>
              <td class="num muted" style="font-size:12px">${fmtKRW(a.totalCapitalPool)}</td></tr>
          </tbody>
        </table>
        <p style="font-size:12px;color:var(--text-3);margin-top:10px">
          Total assets should be close to Total Capital Pool once all receivables settle.
          Differences may be from un-booked income or costs.
        </p>
      </div>
    </div>

    <div class="card" style="margin-top:14px">
      <div class="card-header"><h3 class="card-title">Monthly Profit (last 6 months)</h3>
        <div class="muted" style="font-size:11px">Cash-basis · realized when Fazi Cash comes in</div></div>
      <div class="table-wrap"><table>
        <thead><tr><th>Month</th><th class="num">Fazi Cash</th><th class="num">~COGS</th>
          <th class="num">Discounts</th><th class="num">Expenses</th><th class="num">Payouts</th>
          <th class="num">Profit</th></tr></thead>
        <tbody>${monthRows}</tbody>
      </table></div>
    </div>

    <div class="card" style="margin-top:14px">
      <div class="card-header"><h3 class="card-title">How this works</h3></div>
      <p style="margin:0 0 10px;font-size:13px;color:var(--text-2);line-height:1.6">
        <strong>Total Capital Pool = Initial Investor Capital + Retained Profit.</strong>
        This is the real working capital of your business. It grows automatically as you make profit.
      </p>
      <p style="margin:0 0 10px;font-size:13px;color:var(--text-2);line-height:1.6">
        <strong>Why "Realized" Profit:</strong> A mobile shipped to Pakistan isn't profit until the cash reaches you via Fazi Cash. 
        If you've received half the payment for a shipment, only half of that sale's profit counts as realized. 
        This keeps your capital figure honest — you can only reinvest money that actually exists.
      </p>
      <p style="margin:0;font-size:13px;color:var(--text-2);line-height:1.6">
        <strong>Where the profit sits:</strong> Retained profit doesn't go into a separate box — it's mixed into your working cash, 
        your inventory, and your pending receivables. The "Business Position Today" table shows where everything actually is right now.
      </p>
    </div>
  `;
};

function setAILang(lang){
  aiLang = lang;
  route('ai');
}

function clearAIChat(){
  if(!confirm('Clear this conversation?')) return;
  aiChat = [];
  route('ai');
}

function aiKey(e){
  if(e.key==='Enter' && !e.shiftKey){ e.preventDefault(); aiSend(); }
}

function aiSend(){
  const input = document.getElementById('aiInput');
  const text = input.value.trim();
  if(!text) return;
  input.value = '';
  aiAsk(text);
}

async function aiAsk(text){
  aiChat.push({role:'user', text});
  renderAIChat();
  logActivity('ai_query','ai', text.slice(0,80));

  // Always try offline intent first (instant)
  const offlineAnswer = offlineIntent(text, aiLang);

  const hasKey = !!(data.settings.apiKey);

  if(offlineAnswer && !hasKey){
    // Offline only
    aiChat.push({role:'bot', text:offlineAnswer, source:'offline'});
    renderAIChat();
    return;
  }

  if(offlineAnswer && hasKey){
    // Show offline answer instantly, then enrich with AI
    aiChat.push({role:'bot', text:offlineAnswer, source:'offline'});
    renderAIChat();
    // Don't follow up with API call for simple factual questions — the offline answer is authoritative
    return;
  }

  if(!hasKey){
    const msg = aiLang==='ur'
      ? "Main is sawaal ka jawaab offline mode mein nahi de sakta. Settings mein API key add karein, phir koi bhi sawaal poocha ja sakta hai."
      : "I can't answer that one in offline mode. Add an API key in Settings to ask anything in natural language.";
    aiChat.push({role:'bot', text:msg, source:'offline'});
    renderAIChat();
    return;
  }

  // Online AI via Anthropic API
  await askOnlineAI(text);
}

async function askOnlineAI(text){
  // Typing indicator
  aiChat.push({role:'bot', text:'__typing__', source:'online'});
  renderAIChat();
  const btn = document.getElementById('aiSendBtn');
  if(btn){ btn.disabled = true; btn.textContent = '...'; }

  try {
    const snapshot = buildBusinessSnapshot();
    const sys = aiSystemPrompt(aiLang, snapshot);
    const recent = aiChat.filter(m=>m.text!=='__typing__' && m.role).slice(-10).map(m=>({
      role: m.role==='user'?'user':'assistant',
      content: m.text
    }));

    const r = await fetch('https://api.anthropic.com/v1/messages', {
      method:'POST',
      headers:{
        'content-type':'application/json',
        'x-api-key': data.settings.apiKey,
        'anthropic-version':'2023-06-01',
        'anthropic-dangerous-direct-browser-access':'true',
      },
      body: JSON.stringify({
        model: data.settings.aiModel || 'claude-haiku-4-5',
        max_tokens: 800,
        system: sys,
        messages: recent.length ? recent : [{role:'user', content:text}]
      })
    });
    const j = await r.json();
    // Remove typing indicator
    aiChat = aiChat.filter(m=>m.text!=='__typing__');

    if(r.ok && j.content && j.content[0]){
      const reply = j.content.map(b=>b.text||'').join('\n').trim();
      aiChat.push({role:'bot', text:reply, source:'online'});
    } else {
      const err = j.error?.message || 'Unknown error';
      const msg = aiLang==='ur'
        ? `Maaf kijiye, AI se rabta nahi ho saka. (${err}) — Settings mein API key check karein.`
        : `Sorry, I couldn't reach the AI. (${err}) — check your API key in Settings.`;
      aiChat.push({role:'bot', text:msg, source:'error'});
    }
  } catch(e){
    aiChat = aiChat.filter(m=>m.text!=='__typing__');
    const msg = aiLang==='ur'
      ? `Network mein masla hai: ${e.message}`
      : `Network error: ${e.message}`;
    aiChat.push({role:'bot', text:msg, source:'error'});
  } finally {
    if(btn){ btn.disabled = false; btn.textContent = 'Send'; }
    renderAIChat();
  }
}

function renderAIChat(){
  const el = document.getElementById('aiMessages');
  if(!el) return;
  el.innerHTML = aiChat.map(m=>{
    if(m.text==='__typing__'){
      return `<div class="ai-msg bot"><div class="typing-indicator"><span></span><span></span><span></span></div></div>`;
    }
    const cls = m.role==='user' ? 'user' : (m.source==='error' ? 'bot error' : 'bot');
    const src = m.role==='bot' && m.source ? `<div class="badge-src">${m.source==='online'?'AI':'Instant'}</div>` : '';
    return `<div class="ai-msg ${cls}">${renderMdLite(m.text)}${src}</div>`;
  }).join('');
  el.scrollTop = el.scrollHeight;
}

// Minimal markdown-lite for **bold** and linebreaks
function renderMdLite(s){
  const escaped = String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  return escaped
    .replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>')
    .replace(/`([^`]+)`/g,'<code>$1</code>')
    .replace(/\n/g,'<br>');
}

// -------------------- OFFLINE INTENT ENGINE --------------------
function offlineIntent(text, lang){
  const t = text.toLowerCase().trim();
  const a = agg();

  // Helper strings
  const T = (en, ur) => lang==='ur' ? ur : en;

  // Profit / earnings
  if(/(profit|earning|kamai|faida|mun[aá]fa|munafa)/.test(t)){
    return T(
      `**Your realized profit so far: ${fmtKRW(a.retainedProfit)}**\n\nBreakdown:\n• Realized revenue: ${fmtKRW(a.realizedRevenue)}\n• Cost of goods: −${fmtKRW(a.realizedCOGS)}\n• Hawala discounts: −${fmtKRW(a.hawalaDiscount)}\n• Expenses: −${fmtKRW(a.totalExp)}\n• Investor payouts: −${fmtKRW(a.totalPaid)}\n\n${a.retainedProfit>=0?'Great — this profit is added to your capital pool.':'You are running at a loss right now.'}`,
      `**Ab tak ka asal munafa: ${fmtKRW(a.retainedProfit)}**\n\nTafseel:\n• Realized revenue: ${fmtKRW(a.realizedRevenue)}\n• Mobiles ki cost: −${fmtKRW(a.realizedCOGS)}\n• Hawala discount: −${fmtKRW(a.hawalaDiscount)}\n• Expenses: −${fmtKRW(a.totalExp)}\n• Investor payout: −${fmtKRW(a.totalPaid)}\n\n${a.retainedProfit>=0?'Bahut accha — yeh munafa aapke capital pool mein shaamil ho gaya hai.':'Abhi loss mein hain.'}`
    );
  }

  // Who owes / pending / receivable — BEFORE generic "paisa" check
  if(/(owe|pending|receivable|baqi|udhaar|qarza|waapas|kis\s*(ka|ke))/.test(t)){
    const pendingBuyers = {};
    data.sales.forEach(s=>{
      const total = s.qty*s.pricePerUnit;
      const pending = Math.max(0, total - (s.received||0));
      if(pending>0) pendingBuyers[s.buyer] = (pendingBuyers[s.buyer]||0) + pending;
    });
    const list = Object.entries(pendingBuyers).sort((x,y)=>y[1]-x[1]);
    if(!list.length){
      return T('✓ No pending receivables. All buyers have paid in full.', '✓ Koi buyer ka paisa baqi nahi hai. Sab ne poora payment kar diya hai.');
    }
    const lines = list.slice(0,10).map(([b,v])=>`• **${b}** — ${fmtKRW(v)}`).join('\n');
    return T(
      `**Total pending: ${fmtKRW(a.pendingReceivable)}** across ${list.length} buyer(s):\n\n${lines}`,
      `**Total baqi: ${fmtKRW(a.pendingReceivable)}** (${list.length} buyer se):\n\n${lines}`
    );
  }

  // Shipments
  if(/(shipment|shipping|courier|dhl|ems|delivery|consignment|parcel|box|bhejna|bheja|deliver|tracking)/.test(t)){
    const ships = (data.shipments||[]).slice().sort((x,y)=>y.date.localeCompare(x.date));
    if(!ships.length) return T('No shipments recorded yet. Go to Shipments page to add your first one.','Abhi tak koi shipment nahi. Shipments page se naya banaiye.');
    const total = ships.length;
    const delivered = ships.filter(s=>s.status==='Delivered').length;
    const inProgress = ships.filter(s=>['Preparing','Shipped','In Transit'].includes(s.status)).length;
    const issues = ships.filter(s=>s.status==='Issue').length;
    const totalCost = ships.reduce((sum,s)=>sum+(+s.shippingCost||0),0);
    const recent = ships.slice(0,5).map(s=>{
      const sales = data.sales.filter(x=>x.shipmentId===s.id);
      const units = sales.reduce((sum,x)=>sum+x.qty,0);
      return `• **${s.ref||s.date}** (${s.status||'Preparing'}) — ${s.courier||'?'} · ${units} units · ${fmtKRW(s.shippingCost||0)} cost`;
    }).join('\n');
    return T(
      `**Shipments overview**\n\n• Total: ${total} (${delivered} delivered, ${inProgress} in progress${issues?', '+issues+' with issues':''})\n• Total shipping cost: ${fmtKRW(totalCost)}\n\n**Recent 5:**\n${recent}`,
      `**Shipments ki tafseel**\n\n• Total: ${total} (${delivered} delivered, ${inProgress} in progress${issues?', '+issues+' issue mein':''})\n• Total shipping cost: ${fmtKRW(totalCost)}\n\n**Pichle 5:**\n${recent}`
    );
  }

  // Top selling — BEFORE generic stock/inventory check
  if(/(top|best|most sold|zyada|zyda|sab se|kon sa phone)/.test(t) && /(sell|sold|bik|phone|mobile|model)/.test(t)){
    const sold = {};
    data.sales.forEach(s=> sold[s.model]=(sold[s.model]||0)+s.qty);
    const list = Object.entries(sold).sort((x,y)=>y[1]-x[1]).slice(0,5);
    if(!list.length) return T('No sales recorded yet.','Abhi tak koi sale record nahi.');
    const lines = list.map(([m,q],i)=>`${i+1}. **${m}** — ${q} units`).join('\n');
    return T(`**Top selling models:**\n\n${lines}`, `**Sab se zyada biknay walay phones:**\n\n${lines}`);
  }

  // Inventory / stock — BEFORE generic cash check (since "available" could match either)
  if(/(stock|inventory|phone.*(hai|available)|kitne phone|mobile.*(kitne|hain)|available)/.test(t)){
    const items = data.inventory.filter(x=>x.qty-x.soldQty>0);
    const lines = items.slice(0,10).map(x=>`• **${x.model}** — ${x.qty-x.soldQty} units (${fmtKRW((x.qty-x.soldQty)*x.costPerUnit)})`).join('\n');
    return T(
      `**Stock in hand: ${a.invUnits} units, worth ${fmtKRW(a.invValue)}**\n\n${lines||'No stock currently.'}`,
      `**Stock mein maujood: ${a.invUnits} units, qeemat ${fmtKRW(a.invValue)}**\n\n${lines||'Abhi koi stock nahi.'}`
    );
  }

  // Expenses this month / total
  if(/(expens|kharch|khrch|spend|cost)/.test(t)){
    const thisMonth = ym();
    const monthExp = data.expenses.filter(e=>ym(e.date)===thisMonth).reduce((s,x)=>s+x.amount,0);
    const byCat = {};
    data.expenses.filter(e=>ym(e.date)===thisMonth).forEach(e=>byCat[e.category]=(byCat[e.category]||0)+e.amount);
    const lines = Object.entries(byCat).sort((x,y)=>y[1]-x[1]).map(([c,v])=>`• ${c}: ${fmtKRW(v)}`).join('\n');
    return T(
      `**This month (${thisMonth}) expenses: ${fmtKRW(monthExp)}**\n\n${lines||'No expenses this month yet.'}\n\nTotal all-time expenses: ${fmtKRW(a.totalExp)}`,
      `**Is mahine (${thisMonth}) ke kharche: ${fmtKRW(monthExp)}**\n\n${lines||'Is mahine abhi koi kharcha nahi.'}\n\nShuru se ab tak total kharcha: ${fmtKRW(a.totalExp)}`
    );
  }

  // Fazi Cash / Hawala
  if(/(discount|hawala|fazi)/.test(t)){
    return T(
      `**Fazi Cash summary:**\n\n• Total KRW received: ${fmtKRW(a.hawalaIn)}\n• Total PKR settled: ₨${fmtNum(a.hawalaPKR)}\n• **Total discount given: ${fmtKRW(a.hawalaDiscount)}**\n• Number of transactions: ${data.hawala.length}`,
      `**Fazi Cash ki tafseel:**\n\n• Total KRW mila: ${fmtKRW(a.hawalaIn)}\n• Total PKR settle hua: ₨${fmtNum(a.hawalaPKR)}\n• **Total discount diya: ${fmtKRW(a.hawalaDiscount)}**\n• Total transactions: ${data.hawala.length}`
    );
  }

  // Recent activity / today
  if(/(recent|today|activity|nadeem|bilawal|aaj|kaam)/.test(t)){
    const today = todayISO();
    const todayActs = (data.activity||[]).filter(a=>a.at.startsWith(today));
    const nadeemCount = todayActs.filter(a=>a.user==='nadeem').length;
    const bilawalCount = todayActs.filter(a=>a.user==='bilawal').length;
    const lines = todayActs.slice(-10).reverse().map(a=>{
      const time = a.at.slice(11,16);
      return `• ${time} — **${userName(a.user)}** ${a.action}d ${a.entity}: ${a.detail||''}`;
    }).join('\n');
    return T(
      `**Today's activity (${today})**\n\n• Nadeem: ${nadeemCount} changes\n• Bilawal: ${bilawalCount} changes\n\n${lines||'No changes yet today.'}`,
      `**Aaj ki activity (${today})**\n\n• Nadeem: ${nadeemCount} changes\n• Bilawal: ${bilawalCount} changes\n\n${lines||'Aaj abhi koi change nahi hua.'}`
    );
  }

  // Investor payouts
  if(/(investor|payout|payment|qist|monthly)/.test(t)){
    const lines = data.investors.map(i=>{
      const paid = data.payouts.filter(p=>p.investorId===i.id).reduce((s,x)=>s+(+x.amount||0),0);
      return `• **${i.name}** — capital ${fmtKRW(i.capital)} · monthly ${fmtKRW(i.monthlyPayout)} · paid so far ${fmtKRW(paid)}`;
    }).join('\n');
    return T(
      `**Investor summary** (${data.investors.length} investors, total capital ${fmtKRW(a.totalCapital)}):\n\n${lines}\n\nTotal monthly commitment: ${fmtKRW(a.totalMonthly)}\nTotal paid lifetime: ${fmtKRW(a.totalPaid)}`,
      `**Investors ki tafseel** (${data.investors.length} investors, kul capital ${fmtKRW(a.totalCapital)}):\n\n${lines}\n\nHar mahine dena: ${fmtKRW(a.totalMonthly)}\nAb tak total diya: ${fmtKRW(a.totalPaid)}`
    );
  }

  // Capital / total investment — BEFORE cash check
  if(/(capital|invest|kul paisa|total.*(paisa|money))/.test(t)){
    return T(
      `**Total Capital Pool: ${fmtKRW(a.totalCapitalPool)}**\n\n• Investor capital: ${fmtKRW(a.totalCapital)}\n• My own investment: ${fmtKRW(a.ownerCapital)}\n• Retained profit: ${a.retainedProfit>=0?'+':''}${fmtKRW(a.retainedProfit)}`,
      `**Kul Capital: ${fmtKRW(a.totalCapitalPool)}**\n\n• Investor capital: ${fmtKRW(a.totalCapital)}\n• Meri apni investment: ${fmtKRW(a.ownerCapital)}\n• Retained profit: ${a.retainedProfit>=0?'+':''}${fmtKRW(a.retainedProfit)}`
    );
  }

  // Cash in hand (generic — must come AFTER pending/capital)
  if(/(cash|paisa|paise|hath|how much|kitna)/.test(t)){
    return T(
      `**Cash in hand: ${fmtKRW(a.cashInHand)}**\n\n• Total cash in (hawala + my investments + manual): ${fmtKRW(a.hawalaIn + a.ownerCapital + a.cashIn)}\n• Total out (expenses + payouts + manual): ${fmtKRW(a.totalExp + a.totalPaid + a.cashOut)}\n• Inventory tied up: ${fmtKRW(a.invValue)} (${a.invUnits} units)\n• Pending from buyers: ${fmtKRW(a.pendingReceivable)}`,
      `**Hath mein cash: ${fmtKRW(a.cashInHand)}**\n\n• Total aya (hawala + meri investment + manual): ${fmtKRW(a.hawalaIn + a.ownerCapital + a.cashIn)}\n• Total gaya (expenses + payouts + manual): ${fmtKRW(a.totalExp + a.totalPaid + a.cashOut)}\n• Stock mein phansa: ${fmtKRW(a.invValue)} (${a.invUnits} units)\n• Buyer se pending: ${fmtKRW(a.pendingReceivable)}`
    );
  }

  // Help / what can you do
  if(/(help|what can|kya kar|madad|guide)/.test(t)){
    return T(
      `I can help you with:\n\n• Profit & cash in hand\n• Who owes you money\n• Stock / inventory status\n• This month's expenses\n• Fazi Cash summary & discounts\n• Investor payouts\n• Recent activity by admin\n• Capital pool breakdown\n\nFor open questions like "should I raise my prices?", add an Anthropic API key in Settings to unlock full AI.`,
      `Main aapki madad kar sakta hun:\n\n• Munafa aur cash in hand\n• Kis kay paisay baqi hain\n• Stock / inventory ki halat\n• Is mahine ke kharche\n• Fazi Cash ki tafseel aur discounts\n• Investor payouts\n• Recent activity kis admin ne ki\n• Capital pool ki tafseel\n\nKhula sawaal (jaise "price barhani chahiye?") ke liye Settings mein API key add karein.`
    );
  }

  return null;
}

function buildBusinessSnapshot(){
  const a = agg();
  return {
    business: data.settings.businessName || 'Mobile Hub',
    currency: 'KRW',
    today: todayISO(),
    capital: {
      totalPool: a.totalCapitalPool,
      investorCapital: a.totalCapital,
      ownerCapital: a.ownerCapital,
      retainedProfit: a.retainedProfit,
    },
    cashInHand: a.cashInHand,
    inventory: {
      units: a.invUnits,
      value: a.invValue,
      items: data.inventory.slice(0,20).map(x=>({model:x.model, inStock:x.qty-x.soldQty, costPerUnit:x.costPerUnit})),
    },
    sales: {
      count: data.sales.length,
      totalRevenue: a.salesRev,
      pendingReceivable: a.pendingReceivable,
    },
    shipments: {
      count: (data.shipments||[]).length,
      delivered: (data.shipments||[]).filter(s=>s.status==='Delivered').length,
      inProgress: (data.shipments||[]).filter(s=>['Preparing','Shipped','In Transit'].includes(s.status)).length,
      recent: (data.shipments||[]).slice(-5).map(s=>({
        date:s.date, ref:s.ref, courier:s.courier, status:s.status, shippingCost:s.shippingCost
      })),
    },
    expenses: {
      totalAllTime: a.totalExp,
      thisMonth: data.expenses.filter(e=>ym(e.date)===ym()).reduce((s,x)=>s+x.amount,0),
    },
    hawala: {
      totalKRWReceived: a.hawalaIn,
      totalPKRSettled: a.hawalaPKR,
      totalDiscountGiven: a.hawalaDiscount,
      count: data.hawala.length,
    },
    investors: data.investors.map(i=>({
      name:i.name, capital:i.capital, monthlyPayout:i.monthlyPayout,
      paidLifetime: data.payouts.filter(p=>p.investorId===i.id).reduce((s,x)=>s+(+x.amount||0),0)
    })),
    recentActivity: (data.activity||[]).slice(-15).map(a=>({
      at:a.at.slice(0,16), user:userName(a.user), action:a.action, entity:a.entity, detail:a.detail
    })),
  };
}

function aiSystemPrompt(lang, snapshot){
  const langInstr = lang==='ur'
    ? 'IMPORTANT: Respond in Urdu written in Roman English letters (e.g. "Aap ka munafa bahut accha hai"). Do NOT use Urdu script. Keep tone friendly and conversational.'
    : 'IMPORTANT: Respond in clear, simple English. Keep tone friendly and conversational.';

  return `You are the AI assistant built into "Mobile Hub" — a small mobile phone export business running from South Korea to Pakistan. You help the business owner (Nadeem or Bilawal, who are signed in as admins) understand their business and make decisions.

${langInstr}

Here is the current state of their business (all amounts in Korean Won / KRW unless marked PKR):

${JSON.stringify(snapshot, null, 2)}

Guidelines:
- Be concise. 2-5 sentences is usually enough. Use **bold** for key numbers.
- When giving numbers, format KRW with ₩ prefix like ₩1,500,000.
- The business uses "hawala" — buyers in Pakistan pay in PKR there, and the owner receives the KRW equivalent in Korea. This is their main way of collecting sales revenue.
- Never invent data. If the data above doesn't cover the question, say so and suggest which page of the app to check.
- If asked to write a message/email/WhatsApp to a buyer or investor, keep it professional and brief.
- If asked for advice (e.g., should I raise prices), give a practical suggestion based on their actual numbers.

}

function changePwd(u){

  const confPwd = document.getElementById('pwd_conf_'+suf).value;
  if(!oldPwd||!newPwd){ alert('Please fill both current and new passwords.'); return; }
  if(hashPwd(oldPwd) !== auth.users[u].pwdHash){ alert('Current password is incorrect.'); return; }
  if(newPwd.length<3){ alert('New password must be at least 3 characters.'); return; }
  if(newPwd !== confPwd){ alert('New passwords do not match.'); return; }
  auth.users[u].pwdHash = hashPwd(newPwd);
  saveAuth();
  logActivity('update','password',`${userName(u)} changed password`);
  saveData();
  alert('Password changed successfully.');
  route('settings');
}

async function testAPIKey(){
  const key = document.getElementById('s_apikey').value.trim();
  if(!key){ alert('Enter an API key first.'); return; }
  const model = document.getElementById('s_aimodel').value;
  const btn = event.target;
  const origLabel = btn.textContent;
  btn.textContent = 'Testing...';
  btn.disabled = true;
  try {
    const r = await fetch('https://api.anthropic.com/v1/messages', {
      method:'POST',
      headers:{
        'content-type':'application/json',
        'x-api-key': key,
        'anthropic-version':'2023-06-01',
        'anthropic-dangerous-direct-browser-access':'true',
      },
      body: JSON.stringify({
        model,
        max_tokens: 20,
        messages: [{role:'user', content:'Reply with just: OK'}]
      })
    });
    const j = await r.json();
    if(r.ok && j.content){
      alert('✓ Connection successful! The AI assistant is ready to use.');
    } else {
      alert('✗ Failed: ' + (j.error?.message || JSON.stringify(j).slice(0,200)));
    }
  } catch(e){
    alert('✗ Network error: ' + e.message);
  } finally {
    btn.textContent = origLabel;
    btn.disabled = false;
  }
}

function exportCSV(){
  const sections = [
    ['INVENTORY','id,model,brand,sku,qty,soldQty,costPerUnit,notes', data.inventory.map(x=>[x.id,x.model,x.brand,x.sku,x.qty,x.soldQty,x.costPerUnit,x.notes].map(csvCell).join(','))],
    ['SALES','id,date,buyer,model,qty,pricePerUnit,received,shipmentId,notes', data.sales.map(x=>[x.id,x.date,x.buyer,x.model,x.qty,x.pricePerUnit,x.received,x.shipmentId||'',x.notes].map(csvCell).join(','))],
    ['SHIPMENTS','id,date,ref,courier,status,trackingNumber,arrivedDate,shippingCost,notes', (data.shipments||[]).map(x=>[x.id,x.date,x.ref,x.courier,x.status,x.trackingNumber,x.arrivedDate,x.shippingCost,x.notes].map(csvCell).join(','))],
    ['EXPENSES','id,date,category,amount,note', data.expenses.map(x=>[x.id,x.date,x.category,x.amount,x.note].map(csvCell).join(','))],
    ['CASHFLOW','id,date,type,source,amount,note', data.cashflow.map(x=>[x.id,x.date,x.type,x.source,x.amount,x.note].map(csvCell).join(','))],
    ['HAWALA','id,date,amountKRW,amountPKR,discountKRW,buyer,receiverName,receiverPhone,receivedBy,note', data.hawala.map(x=>[x.id,x.date,x.amountKRW,x.amountPKR,x.discountKRW,x.buyer,x.receiverName,x.receiverPhone,x.receivedBy,x.note].map(csvCell).join(','))],
    ['INVESTORS','id,name,contact,capitalPKR,capital,monthlyPayoutPKR,monthlyPayout,startDate,notes', data.investors.map(x=>[x.id,x.name,x.contact,x.capitalPKR,x.capital,x.monthlyPayoutPKR,x.monthlyPayout,x.startDate,x.notes].map(csvCell).join(','))],
    ['OWNER_INVESTMENTS','id,date,source,amountPKR,amountKRW,note', (data.ownerInvestments||[]).map(x=>[x.id,x.date,x.source,x.amountPKR,x.amountKRW,x.note].map(csvCell).join(','))],
    ['PAYOUTS','id,investorId,date,amountPKR,amount,note', data.payouts.map(x=>[x.id,x.investorId,x.date,x.amountPKR,x.amount,x.note].map(csvCell).join(','))],
  ];
  let csv = '';
  sections.forEach(([t,h,r])=>{ csv += `# ${t}\n${h}\n${r.join('\n')}\n\n`; });
  const blob = new Blob([csv],{type:'text/csv'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href=url; a.download=`mobilehub-data-${todayISO()}.csv`; a.click();
  URL.revokeObjectURL(url);
}
function csvCell(v){ v = (v===undefined||v===null)?'':String(v); return v.includes(',')||v.includes('"')||v.includes('\n') ? '"'+v.replace(/"/g,'""')+'"' : v; }
function importJSON(ev){
  const f = ev.target.files[0]; if(!f) return;
  const r = new FileReader();
  r.onload = () => {
    try{
      const parsed = JSON.parse(r.result);
      if(!confirm('This will REPLACE all current data. Continue?')) return;
      data = parsed;
      if(!data.activity) data.activity = [];
      logActivity('import','data',`JSON backup imported (${f.name})`);
      saveData(); route(currentPage); alert('Imported successfully');
    }catch(e){ alert('Invalid JSON file'); }
  };
  r.readAsText(f);
}
function resetAll(){
  if(!confirm('Delete ALL data? This cannot be undone. Consider exporting a backup first.')) return;
  if(!confirm('Are you absolutely sure?')) return;
  localStorage.removeItem(STORE_KEY);
  data = loadData();
  logActivity('delete','data','All data reset');
  saveData();
  route('dashboard');
}

  ws['!cols'] = [{wch:28},{wch:12},{wch:14},{wch:8},{wch:10},{wch:14},{wch:24}];

  XLSX.utils.book_append_sheet(wb, ws, 'Inventory');
  XLSX.writeFile(wb, `inventory-template.xlsx`);
}
function xlsxInvExport(){
  const rows = data.inventory.map(x=>({
    model:x.model, brand:x.brand||'', sku:x.sku||'',
    qty:x.qty, soldQty:x.soldQty, costPerUnit:x.costPerUnit,
    remaining: Math.max(0, x.qty-x.soldQty),
    stockValue: Math.max(0, x.qty-x.soldQty)*x.costPerUnit,
    notes:x.notes||''
  }));
  const ws = XLSX.utils.json_to_sheet(rows);
  ws['!cols'] = [{wch:28},{wch:12},{wch:14},{wch:8},{wch:8},{wch:14},{wch:10},{wch:14},{wch:24}];
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Inventory');
  XLSX.writeFile(wb, `inventory-${todayISO()}.xlsx`);
}
function xlsxInvImport(ev){
  const f = ev.target.files[0]; if(!f) return;
  const reader = new FileReader();
  reader.onload = e => {
    try{
      const wb = XLSX.read(e.target.result, {type:'array'});
      const ws = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(ws, {defval:''});
      if(!rows.length){ alert('The file has no data rows.'); return; }
      const mode = confirm(`Found ${rows.length} row(s).\n\nOK = APPEND to existing inventory\nCancel = REPLACE all inventory`);
      if(!mode){
        if(!confirm('Really REPLACE all inventory? Existing items will be deleted.')) { ev.target.value=''; return; }
        data.inventory = [];
      }
      let added=0, skipped=0;
      rows.forEach(r=>{
        const model = String(r.model||r.Model||'').trim();
        if(!model){ skipped++; return; }
        const item = stamp({
          id: uid(),
          model,
          brand: String(r.brand||r.Brand||'').trim(),
          sku: String(r.sku||r.SKU||'').trim(),
          qty: Number(r.qty||r.Qty||r.quantity||0) || 0,
          soldQty: Number(r.soldQty||r.sold||0) || 0,
          costPerUnit: Number(r.costPerUnit||r.cost||r.price||0) || 0,
          notes: String(r.notes||r.Notes||'').trim(),
        }, true);
        data.inventory.push(item);
        added++;
      });
      logActivity('import','inventory',`Excel import: ${added} item(s) added`);
      saveData();
      alert(`Imported ${added} item(s). ${skipped?skipped+' skipped (no model name).':''}`);
      ev.target.value='';
      route('inventory');
    }catch(err){
      alert('Could not read file. Make sure it is a valid .xlsx / .xls / .csv.\n\n'+err.message);
      ev.target.value='';
    }
  };
  reader.readAsArrayBuffer(f);
}

// Sales: date, buyer, model, qty, pricePerUnit, received, notes
function xlsxSalesTemplate(){
  const rows = [
    {date:todayISO(), buyer:'Ali Traders, Karachi', model:'iPhone 15 Pro 256GB', qty:5, pricePerUnit:1820000, received:0, notes:'Pending hawala'},
    {date:todayISO(), buyer:'Karim Mobiles, Lahore', model:'Samsung S24 Ultra 512GB', qty:3, pricePerUnit:1600000, received:0, notes:''},
  ];
  const ws = XLSX.utils.json_to_sheet(rows, {header:['date','buyer','model','qty','pricePerUnit','received','notes']});
  ws['!cols'] = [{wch:12},{wch:24},{wch:28},{wch:8},{wch:14},{wch:14},{wch:24}];
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Sales');
  XLSX.writeFile(wb, `sales-template.xlsx`);
}
function xlsxSalesExport(){
  const rows = data.sales.map(x=>{
    const total = x.qty*x.pricePerUnit;
    return {
      date:x.date, buyer:x.buyer, model:x.model, qty:x.qty,
      pricePerUnit:x.pricePerUnit, total, received:x.received||0,
      pending: Math.max(0, total-(x.received||0)),
      notes:x.notes||''
    };
  });
  const ws = XLSX.utils.json_to_sheet(rows);
  ws['!cols'] = [{wch:12},{wch:24},{wch:28},{wch:8},{wch:14},{wch:14},{wch:14},{wch:14},{wch:24}];
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Sales');
  XLSX.writeFile(wb, `sales-${todayISO()}.xlsx`);
}
function xlsxSalesImport(ev){
  const f = ev.target.files[0]; if(!f) return;
  const reader = new FileReader();
  reader.onload = e => {
    try{
      const wb = XLSX.read(e.target.result, {type:'array'});
      const ws = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(ws, {defval:''});
      if(!rows.length){ alert('The file has no data rows.'); return; }
      const mode = confirm(`Found ${rows.length} row(s).\n\nOK = APPEND to existing sales\nCancel = REPLACE all sales`);
      if(!mode){
        if(!confirm('Really REPLACE all sales? Existing sales will be deleted. (Inventory sold counts will be recalculated.)')) { ev.target.value=''; return; }
        // Roll back sold quantities from existing sales
        data.sales.forEach(s=>{
          const item = data.inventory.find(i=>i.model===s.model);
          if(item) item.soldQty = Math.max(0, (item.soldQty||0) - s.qty);
        });
        data.sales = [];
      }
      let added=0, skipped=0, warnings=[];
      rows.forEach(r=>{
        const buyer = String(r.buyer||r.Buyer||'').trim();
        const model = String(r.model||r.Model||'').trim();
        const qty = Number(r.qty||r.Qty||r.quantity||0) || 0;
        if(!buyer || !model || !qty){ skipped++; return; }
        let date = r.date || r.Date || todayISO();
        // Excel sometimes returns serial date numbers
        if(typeof date === 'number'){
          const d = XLSX.SSF.parse_date_code(date);
          if(d) date = `${d.y}-${String(d.m).padStart(2,'0')}-${String(d.d).padStart(2,'0')}`;
        } else {
          date = String(date).slice(0,10);
        }
        const sale = stamp({
          id: uid(),
          date,
          buyer,
          model,
          qty,
          pricePerUnit: Number(r.pricePerUnit||r.price||r.Price||0) || 0,
          received: Number(r.received||r.Received||0) || 0,
          notes: String(r.notes||r.Notes||'').trim(),
        }, true);
        data.sales.push(sale);
        // Update inventory sold count (warn if model not found)
        const item = data.inventory.find(i=>i.model===model);
        if(item) item.soldQty = (item.soldQty||0) + qty;
        else if(warnings.length<3) warnings.push(model);
        added++;
      });
      logActivity('import','sale',`Excel import: ${added} sale(s) added`);
      saveData();
      let msg = `Imported ${added} sale(s). ${skipped?skipped+' skipped (missing buyer/model/qty). ':''}`;
      if(warnings.length) msg += `\n\nNote: these models aren't in your inventory yet — they were saved but no stock was deducted: ${warnings.join(', ')}${warnings.length>=3?'...':''}`;
      alert(msg);
      ev.target.value='';
      route('sales');
    }catch(err){
      alert('Could not read file. Make sure it is a valid .xlsx / .xls / .csv.\n\n'+err.message);
      ev.target.value='';
    }
  };
  reader.readAsArrayBuffer(f);
}

// -------------------- boot --------------------
// Expose ALL inline event-handler functions to window. In some browsers/WebViews
// (file:// protocol, strict CSP, mobile in-app browsers, etc.), top-level
// function declarations are not auto-promoted to globals, so inline
// onclick="fnName()" silently fails. Listing them all explicitly fixes that.
try {
  const exports = {
    // Auth
    logout, doLogin, pickUser, changePwd, resetAuth, resetLoginFromScreen,
    // Routing / UI
    route, toggleMenu, closeModal,
    // Inventory
    invForm, invSave, invDel,
    xlsxInvTemplate, xlsxInvExport, xlsxInvImport,
    // Sales
    saleForm, saleSave, saleDel,
    xlsxSalesTemplate, xlsxSalesExport, xlsxSalesImport,
    // Shipments
    shipForm, shipSave, shipDel,
    // Expenses
    expForm, expSave, expDel,
    // Cashflow
    cfForm, cfSave, cfDel,
    // Fazi Cash (formerly hawala)
    hawForm, hawSave, hawDel,
    // Investors
    invstForm, invstSave, invstDel,
    // Owner investments
    ownForm, ownSave, ownDel,
    // Payouts
    payoutForm, payoutSave, payoutDel,
    // Activity log
    actFilter, clearActivity,
    // AI Assistant
    setAILang, clearAIChat, aiKey, aiSend, aiAsk,
    // Settings
    saveSettings, saveAISettings, testAPIKey, clearAPIKey,
    exportJSON, exportCSV, importJSON, resetAll,
  };
  Object.keys(exports).forEach(k => { window[k] = exports[k]; });
} catch(e){
  console.error('Failed to expose handlers to window:', e);
}

(function boot(){
  // Check existing session
  const savedUser = sessionStorage.getItem(SESSION_KEY) || localStorage.getItem(SESSION_KEY);
  if(savedUser && auth.users[savedUser]){
    currentUser = savedUser;
    showApp();
  } else {
    document.getElementById('loginScreen').style.display='flex';
    document.getElementById('app').style.display='none';
  }
})();
