<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Mobile Hub — Business Manager (KR ↔ PK)</title>
<style>
  :root{
    --bg:#f6f7f9; --surface:#ffffff; --surface-2:#f0f2f5;
    --text:#111827; --text-2:#4b5563; --text-3:#6b7280;
    --border:#e5e7eb; --border-2:#d1d5db;
    --brand:#1e40af; --brand-2:#1d4ed8; --brand-soft:#dbeafe;
    --green:#047857; --green-soft:#d1fae5;
    --red:#b91c1c; --red-soft:#fee2e2;
    --amber:#b45309; --amber-soft:#fef3c7;
    --purple:#6d28d9; --purple-soft:#ede9fe;
    --teal:#0f766e; --teal-soft:#ccfbf1;
    --radius:10px; --radius-lg:14px;
    --shadow:0 1px 2px rgba(17,24,39,.06), 0 1px 3px rgba(17,24,39,.06);
  }
  @media (prefers-color-scheme: dark){
    :root{
      --bg:#0b0f17; --surface:#111827; --surface-2:#1f2937;
      --text:#f3f4f6; --text-2:#d1d5db; --text-3:#9ca3af;
      --border:#374151; --border-2:#4b5563;
      --brand:#60a5fa; --brand-2:#3b82f6; --brand-soft:#1e3a8a;
      --green:#34d399; --green-soft:#064e3b;
      --red:#f87171; --red-soft:#7f1d1d;
      --amber:#fbbf24; --amber-soft:#78350f;
      --purple:#a78bfa; --purple-soft:#4c1d95;
      --teal:#2dd4bf; --teal-soft:#134e4a;
    }
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;font-size:14px;-webkit-font-smoothing:antialiased}
  a{color:var(--brand-2);text-decoration:none}
  button{font-family:inherit}

  /* App shell */
  .app{display:grid;grid-template-columns:240px 1fr;min-height:100vh}
  .sidebar{background:var(--surface);border-right:1px solid var(--border);padding:18px 14px;position:sticky;top:0;height:100vh;overflow-y:auto}
  .brand{display:flex;align-items:center;gap:10px;margin-bottom:18px;padding:4px 6px}
  .brand-logo{width:34px;height:34px;border-radius:8px;background:linear-gradient(135deg,var(--brand),var(--purple));display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:15px}
  .brand-title{font-weight:600;font-size:15px;line-height:1.1}
  .brand-sub{font-size:11px;color:var(--text-3);margin-top:2px}
  .nav{display:flex;flex-direction:column;gap:2px;margin-top:8px}
  .nav button{display:flex;align-items:center;gap:10px;background:transparent;border:0;color:var(--text-2);padding:10px 12px;border-radius:8px;cursor:pointer;font-size:13.5px;text-align:left;width:100%}
  .nav button:hover{background:var(--surface-2);color:var(--text)}
  .nav button.active{background:var(--brand-soft);color:var(--brand);font-weight:600}
  .nav .icon{width:18px;height:18px;flex-shrink:0;display:inline-flex;align-items:center;justify-content:center}

  .main{padding:22px 28px 60px;min-width:0}
  .topbar{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:18px;flex-wrap:wrap}
  .page-title{font-size:22px;font-weight:600;margin:0}
  .page-sub{font-size:13px;color:var(--text-3);margin-top:3px}
  .topbar .right{display:flex;gap:8px;align-items:center;flex-wrap:wrap}

  /* Buttons */
  .btn{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border-radius:8px;border:1px solid var(--border);background:var(--surface);color:var(--text);cursor:pointer;font-size:13px;font-weight:500;transition:all .15s}
  .btn:hover{border-color:var(--border-2);background:var(--surface-2)}
  .btn-primary{background:var(--brand);border-color:var(--brand);color:#fff}
  .btn-primary:hover{background:var(--brand-2);border-color:var(--brand-2)}
  .btn-danger{background:var(--surface);color:var(--red);border-color:var(--border)}
  .btn-danger:hover{background:var(--red-soft);border-color:var(--red)}
  .btn-sm{padding:5px 10px;font-size:12px}
  .btn-icon{padding:6px 8px}

  /* Cards */
  .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:18px;box-shadow:var(--shadow)}
  .card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;gap:12px;flex-wrap:wrap}
  .card-title{font-size:15px;font-weight:600;margin:0}

  /* KPI grid */
  .kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin-bottom:18px}
  .kpi{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px}
  .kpi-label{font-size:12px;color:var(--text-3);font-weight:500;text-transform:uppercase;letter-spacing:.04em}
  .kpi-value{font-size:22px;font-weight:600;margin-top:6px;line-height:1.2}
  .kpi-sub{font-size:11.5px;color:var(--text-3);margin-top:4px}
  .kpi-value.pos{color:var(--green)}
  .kpi-value.neg{color:var(--red)}
  .kpi-value.brand{color:var(--brand)}
  .kpi-value.purple{color:var(--purple)}

  /* Tables */
  .table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;border-radius:8px;border:1px solid var(--border)}
  table{width:100%;border-collapse:collapse;font-size:13px;min-width:500px}
  th,td{text-align:left;padding:10px 12px;border-bottom:1px solid var(--border);white-space:nowrap}
  th{background:var(--surface-2);font-weight:600;font-size:12px;color:var(--text-2);text-transform:uppercase;letter-spacing:.03em;position:sticky;top:0}
  tbody tr:hover{background:var(--surface-2)}
  tbody tr:last-child td{border-bottom:0}
  td.num, th.num{text-align:right;font-variant-numeric:tabular-nums}
  .empty{padding:30px;text-align:center;color:var(--text-3);font-size:13px}

  /* Badges */
  .badge{display:inline-block;padding:3px 9px;border-radius:999px;font-size:11px;font-weight:600}
  .badge-green{background:var(--green-soft);color:var(--green)}
  .badge-red{background:var(--red-soft);color:var(--red)}
  .badge-amber{background:var(--amber-soft);color:var(--amber)}
  .badge-brand{background:var(--brand-soft);color:var(--brand)}
  .badge-purple{background:var(--purple-soft);color:var(--purple)}
  .badge-teal{background:var(--teal-soft);color:var(--teal)}
  .badge-gray{background:var(--surface-2);color:var(--text-2)}

  /* Forms / Modals */
  .modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.55);display:none;align-items:center;justify-content:center;padding:16px;z-index:100}
  .modal-bg.show{display:flex}
  .modal{background:var(--surface);border-radius:var(--radius-lg);max-width:520px;width:100%;max-height:90vh;overflow-y:auto;padding:22px;border:1px solid var(--border)}
  .modal h3{margin:0 0 14px;font-size:17px}
  .form-row{display:flex;flex-direction:column;gap:6px;margin-bottom:12px}
  .form-row label{font-size:12px;color:var(--text-2);font-weight:500}
  .form-row input,.form-row select,.form-row textarea{
    background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:9px 11px;font-size:14px;color:var(--text);font-family:inherit;width:100%
  }
  .form-row input:focus,.form-row select:focus,.form-row textarea:focus{outline:none;border-color:var(--brand)}
  .form-row textarea{min-height:70px;resize:vertical}
  .form-row-2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .modal-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:18px;flex-wrap:wrap}

  /* Dashboard charts */
  .chart-grid{display:grid;grid-template-columns:2fr 1fr;gap:14px;margin-bottom:14px}
  @media (max-width:900px){ .chart-grid{grid-template-columns:1fr} }
  .chart-box{height:280px;position:relative}
  .chart-box.small{height:220px}

  /* Investor cards */
  .inv-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:12px}
  .inv-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px}
  .inv-card h4{margin:0 0 4px;font-size:15px}
  .inv-card .inv-meta{font-size:12px;color:var(--text-3)}
  .inv-card .inv-stats{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-top:12px;font-size:12px}
  .inv-stat-label{color:var(--text-3)}
  .inv-stat-val{font-weight:600;font-size:13px;margin-top:2px}
  .inv-card .actions{display:flex;gap:6px;margin-top:12px;flex-wrap:wrap}

  /* Mobile */
  .menu-toggle{display:none;background:none;border:0;color:var(--text);font-size:22px;cursor:pointer;padding:6px}
  @media (max-width:780px){
    .app{grid-template-columns:1fr}
    .sidebar{position:fixed;left:-260px;width:240px;z-index:90;transition:left .25s;box-shadow:4px 0 16px rgba(0,0,0,.2)}
    .sidebar.open{left:0}
    .menu-toggle{display:inline-flex}
    .main{padding:16px}
    .page-title{font-size:18px}
    .backdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:80}
    .backdrop.show{display:block}
  }
  @media (max-width:480px){
    .kpi-value{font-size:18px}
    th,td{padding:8px 10px}
    .form-row-2{grid-template-columns:1fr}
  }

  /* Utility */
  .pill-filter{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
  .pill-filter button{background:var(--surface);border:1px solid var(--border);padding:6px 12px;border-radius:999px;font-size:12px;cursor:pointer;color:var(--text-2)}
  .pill-filter button.active{background:var(--brand);color:#fff;border-color:var(--brand)}
  .inline-actions{display:flex;gap:4px}
  .muted{color:var(--text-3)}
  .text-green{color:var(--green)}
  .text-red{color:var(--red)}
  .sep{height:1px;background:var(--border);margin:14px 0}
</style>
</head>
<body>

<div class="backdrop" id="backdrop" onclick="toggleMenu(false)"></div>

<div class="app">
  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <div class="brand">
      <div class="brand-logo">MH</div>
      <div>
        <div class="brand-title">Mobile Hub</div>
        <div class="brand-sub">Korea → Pakistan Exports</div>
      </div>
    </div>
    <nav class="nav" id="nav">
      <button data-page="dashboard" class="active"><span class="icon">📊</span> Dashboard</button>
      <button data-page="inventory"><span class="icon">📦</span> Inventory</button>
      <button data-page="sales"><span class="icon">💼</span> Sales / Shipments</button>
      <button data-page="expenses"><span class="icon">💸</span> Expenses</button>
      <button data-page="cashflow"><span class="icon">💵</span> Cash In / Out</button>
      <button data-page="hawala"><span class="icon">🔁</span> Hawala Log</button>
      <button data-page="investors"><span class="icon">👥</span> Investors</button>
      <button data-page="payouts"><span class="icon">📅</span> Investor Payouts</button>
      <button data-page="settings"><span class="icon">⚙️</span> Settings / Backup</button>
    </nav>
  </aside>

  <!-- MAIN -->
  <main class="main">
    <div class="topbar">
      <div style="display:flex;align-items:center;gap:10px">
        <button class="menu-toggle" onclick="toggleMenu()">☰</button>
        <div>
          <h1 class="page-title" id="pageTitle">Dashboard</h1>
          <div class="page-sub" id="pageSub">Overview of your business</div>
        </div>
      </div>
      <div class="right" id="pageActions"></div>
    </div>
    <div id="content"></div>
  </main>
</div>

<!-- MODAL -->
<div class="modal-bg" id="modalBg">
  <div class="modal" id="modal"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script>
/* =========================================================
   Mobile Hub — Korea → Pakistan Export Business Manager
   Single-file app. All data stored in browser localStorage.
   Currency: KRW (working) · PKR (reference for hawala/investors)
   ========================================================= */

const STORE_KEY = 'mobilex_v1';
const fmtKRW = n => '₩' + (Number(n)||0).toLocaleString('en-US', {maximumFractionDigits:0});
const fmtNum = n => (Number(n)||0).toLocaleString('en-US', {maximumFractionDigits:0});
const todayISO = () => new Date().toISOString().slice(0,10);
const ym = d => (d||todayISO()).slice(0,7);
const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2,7);

// -------------------- Data layer --------------------
const defaultData = {
  inventory: [
    // Example seed rows so the app is not empty on first open
    {id:uid(), model:'iPhone 15 Pro 256GB', brand:'Apple', sku:'IP15P-256', qty:12, costPerUnit:1650000, soldQty:8, notes:'Space Black'},
    {id:uid(), model:'Samsung S24 Ultra 512GB', brand:'Samsung', sku:'S24U-512', qty:6, costPerUnit:1420000, soldQty:4, notes:''},
  ],
  sales: [
    {id:uid(), date:todayISO(), buyer:'Ali Traders, Karachi', model:'iPhone 15 Pro 256GB', qty:8, pricePerUnit:1820000, received:0, notes:'Pending hawala'},
  ],
  expenses: [
    {id:uid(), date:todayISO(), category:'Shipping', amount:350000, note:'DHL box to Karachi'},
    {id:uid(), date:todayISO(), category:'Packaging', amount:45000, note:''},
  ],
  cashflow: [
    {id:uid(), date:todayISO(), type:'in', amount:2500000, source:'Investor top-up', note:'Initial capital'},
  ],
  hawala: [
    // {date, amountKRW, amountPKR, discountKRW, buyer, receiverName, receivedBy, note}
  ],
  investors: [
    {id:uid(), name:'Investor 1', contact:'', capitalPKR:2000000, capital:10000000, monthlyPayoutPKR:60000, monthlyPayout:300000, startDate:todayISO(), notes:''},
    {id:uid(), name:'Investor 2', contact:'', capitalPKR:1600000, capital:8000000,  monthlyPayoutPKR:48000, monthlyPayout:240000, startDate:todayISO(), notes:''},
    {id:uid(), name:'Investor 3', contact:'', capitalPKR:1000000, capital:5000000,  monthlyPayoutPKR:30000, monthlyPayout:150000, startDate:todayISO(), notes:''},
    {id:uid(), name:'Investor 4', contact:'', capitalPKR:1000000, capital:5000000,  monthlyPayoutPKR:30000, monthlyPayout:150000, startDate:todayISO(), notes:''},
    {id:uid(), name:'Investor 5', contact:'', capitalPKR:800000,  capital:4000000,  monthlyPayoutPKR:24000, monthlyPayout:120000, startDate:todayISO(), notes:''},
  ],
  payouts: [
    // {id, investorId, date, amount (KRW), amountPKR, note}
  ],
  settings: {
    businessName: 'Mobile Hub',
    owner: '',
  }
};

function loadData(){
  try{
    const raw = localStorage.getItem(STORE_KEY);
    if(!raw) return JSON.parse(JSON.stringify(defaultData));
    const parsed = JSON.parse(raw);
    // Ensure all keys exist
    for(const k in defaultData) if(!(k in parsed)) parsed[k] = defaultData[k];
    return parsed;
  }catch(e){ return JSON.parse(JSON.stringify(defaultData)); }
}
function saveData(){ localStorage.setItem(STORE_KEY, JSON.stringify(data)); }
let data = loadData();

// -------------------- Modal helpers --------------------
function openModal(html){
  document.getElementById('modal').innerHTML = html;
  document.getElementById('modalBg').classList.add('show');
}
function closeModal(){ document.getElementById('modalBg').classList.remove('show'); }
document.getElementById('modalBg').addEventListener('click', e=>{ if(e.target.id==='modalBg') closeModal(); });

// -------------------- Routing --------------------
const pages = {};
let currentPage = 'dashboard';
function route(page){
  currentPage = page;
  document.querySelectorAll('.nav button').forEach(b=>b.classList.toggle('active', b.dataset.page===page));
  const titles = {
    dashboard:['Dashboard','Overview of your business'],
    inventory:['Inventory','Stock of mobile phones in hand'],
    sales:['Sales / Shipments','Orders sent to Pakistan buyers'],
    expenses:['Expenses','Shipping, packing, commission, personal costs'],
    cashflow:['Cash In / Out','Complete money movement record'],
    hawala:['Hawala Log','KRW received locally from buyer\'s Korean contact'],
    investors:['Investors','5 investors with monthly payouts'],
    payouts:['Investor Payouts','Record of monthly payments to investors'],
    settings:['Settings & Backup','Export, import, reset your data'],
  };
  document.getElementById('pageTitle').textContent = titles[page][0];
  document.getElementById('pageSub').textContent = titles[page][1];
  document.getElementById('pageActions').innerHTML = '';
  pages[page]();
  if(window.innerWidth<=780) toggleMenu(false);
}
document.querySelectorAll('.nav button').forEach(b=>b.addEventListener('click', ()=>route(b.dataset.page)));
function toggleMenu(force){
  const s = document.getElementById('sidebar');
  const bd = document.getElementById('backdrop');
  const open = force===undefined ? !s.classList.contains('open') : force;
  s.classList.toggle('open', open);
  bd.classList.toggle('show', open);
}

// -------------------- Aggregations --------------------
function agg(){
  const invValue = data.inventory.reduce((a,x)=> a + Math.max(0,(x.qty - x.soldQty)) * x.costPerUnit, 0);
  const invUnits = data.inventory.reduce((a,x)=> a + Math.max(0,(x.qty - x.soldQty)), 0);
  const salesRev = data.sales.reduce((a,x)=> a + x.qty * x.pricePerUnit, 0);
  const salesCOGS = data.sales.reduce((a,x)=>{
    const item = data.inventory.find(i=>i.model===x.model);
    return a + x.qty * (item ? item.costPerUnit : 0);
  }, 0);
  const grossProfit = salesRev - salesCOGS;
  const totalExp = data.expenses.reduce((a,x)=>a+x.amount,0);
  const netProfit = grossProfit - totalExp;
  const cashIn = data.cashflow.filter(c=>c.type==='in').reduce((a,x)=>a+x.amount,0);
  const cashOut = data.cashflow.filter(c=>c.type==='out').reduce((a,x)=>a+x.amount,0);
  const hawalaIn = data.hawala.reduce((a,x)=>a+(+x.amountKRW||0),0);
  const hawalaPKR = data.hawala.reduce((a,x)=>a+(+x.amountPKR||0),0);
  const hawalaDiscount = data.hawala.reduce((a,x)=>a+(+x.discountKRW||0),0);
  const pendingReceivable = data.sales.reduce((a,x)=> a + Math.max(0, (x.qty*x.pricePerUnit) - (x.received||0)), 0);
  const totalCapital = data.investors.reduce((a,x)=>a+(+x.capital||0),0);
  const totalCapitalPKR = data.investors.reduce((a,x)=>a+(+x.capitalPKR||0),0);
  const totalMonthly = data.investors.reduce((a,x)=>a+(+x.monthlyPayout||0),0);
  const totalMonthlyPKR = data.investors.reduce((a,x)=>a+(+x.monthlyPayoutPKR||0),0);
  const totalPaid = data.payouts.reduce((a,x)=>a+(+x.amount||0),0);
  const totalPaidPKR = data.payouts.reduce((a,x)=>a+(+x.amountPKR||0),0);
  const cashInHand = cashIn - cashOut + hawalaIn - totalExp - totalPaid;
  return {invValue,invUnits,salesRev,salesCOGS,grossProfit,totalExp,netProfit,cashIn,cashOut,hawalaIn,hawalaPKR,hawalaDiscount,pendingReceivable,totalCapital,totalCapitalPKR,totalMonthly,totalMonthlyPKR,totalPaid,totalPaidPKR,cashInHand};
}

// -------------------- DASHBOARD --------------------
pages.dashboard = () => {
  const a = agg();
  const content = document.getElementById('content');
  content.innerHTML = `
    <div class="kpi-grid">
      <div class="kpi"><div class="kpi-label">Cash In Hand</div>
        <div class="kpi-value ${a.cashInHand>=0?'pos':'neg'}">${fmtKRW(a.cashInHand)}</div>
        <div class="kpi-sub">Cash in + Hawala − Out − Exp − Payouts</div></div>
      <div class="kpi"><div class="kpi-label">Inventory Value</div>
        <div class="kpi-value brand">${fmtKRW(a.invValue)}</div>
        <div class="kpi-sub">${a.invUnits} units in stock</div></div>
      <div class="kpi"><div class="kpi-label">Total Sales</div>
        <div class="kpi-value">${fmtKRW(a.salesRev)}</div>
        <div class="kpi-sub">${data.sales.length} shipment(s)</div></div>
      <div class="kpi"><div class="kpi-label">Gross Profit</div>
        <div class="kpi-value ${a.grossProfit>=0?'pos':'neg'}">${fmtKRW(a.grossProfit)}</div>
        <div class="kpi-sub">Sales − cost of goods</div></div>
      <div class="kpi"><div class="kpi-label">Net Profit</div>
        <div class="kpi-value ${a.netProfit>=0?'pos':'neg'}">${fmtKRW(a.netProfit)}</div>
        <div class="kpi-sub">After expenses</div></div>
      <div class="kpi"><div class="kpi-label">Pending Receivable</div>
        <div class="kpi-value ${a.pendingReceivable>0?'neg':''}">${fmtKRW(a.pendingReceivable)}</div>
        <div class="kpi-sub">Yet to be collected via hawala</div></div>
      <div class="kpi"><div class="kpi-label">Hawala Received (KRW)</div>
        <div class="kpi-value pos">${fmtKRW(a.hawalaIn)}</div>
        <div class="kpi-sub">Your earnings from PK sales · ₨${fmtNum(a.hawalaPKR)} PKR settled</div></div>
      <div class="kpi"><div class="kpi-label">Total Hawala Discount</div>
        <div class="kpi-value neg">${fmtKRW(a.hawalaDiscount)}</div>
        <div class="kpi-sub">Discount given on hawala</div></div>
      <div class="kpi"><div class="kpi-label">Investor Capital</div>
        <div class="kpi-value purple">${fmtKRW(a.totalCapital)}</div>
        <div class="kpi-sub">${data.investors.length} investors · ₨${fmtNum(a.totalCapitalPKR)} paid in PK</div></div>
      <div class="kpi"><div class="kpi-label">Monthly Payout Due</div>
        <div class="kpi-value">${fmtKRW(a.totalMonthly)}</div>
        <div class="kpi-sub">₨${fmtNum(a.totalMonthlyPKR)}/mo in PK · Total paid: ${fmtKRW(a.totalPaid)}</div></div>
    </div>

    <div class="chart-grid">
      <div class="card">
        <div class="card-header"><h3 class="card-title">Monthly Cash Flow (last 6 months)</h3></div>
        <div class="chart-box"><canvas id="chartCash"></canvas></div>
      </div>
      <div class="card">
        <div class="card-header"><h3 class="card-title">Expense Breakdown</h3></div>
        <div class="chart-box small"><canvas id="chartExp"></canvas></div>
      </div>
    </div>

  data.payouts.slice(-5).forEach(p=>{

}

let chartCash, chartExp, chartSales, chartInv;
function chartColors(){
  const dark = matchMedia('(prefers-color-scheme: dark)').matches;
  return {
    text: dark ? '#d1d5db' : '#4b5563',
    grid: dark ? '#374151' : '#e5e7eb',
    palette: ['#1e40af','#047857','#b45309','#6d28d9','#0f766e','#b91c1c','#db2777','#0891b2']
  };
}
function drawCashChart(){
  const months = [];
  const d = new Date();
  for(let i=5;i>=0;i--){
    const dd = new Date(d.getFullYear(), d.getMonth()-i, 1);
    months.push(dd.toISOString().slice(0,7));
  }
  const inflow = months.map(m=>{
    const hawala = data.hawala.filter(h=>ym(h.date)===m).reduce((a,x)=>a+x.amountKRW,0);
    const ci = data.cashflow.filter(c=>c.type==='in'&&ym(c.date)===m).reduce((a,x)=>a+x.amount,0);
    return hawala + ci;
  });
  const outflow = months.map(m=>{
    const exp = data.expenses.filter(e=>ym(e.date)===m).reduce((a,x)=>a+x.amount,0);
    const co = data.cashflow.filter(c=>c.type==='out'&&ym(c.date)===m).reduce((a,x)=>a+x.amount,0);
    const po = data.payouts.filter(p=>ym(p.date)===m).reduce((a,x)=>a+x.amount,0);
    return exp + co + po;
  });
  const c = chartColors();
  if(chartCash) chartCash.destroy();
  chartCash = new Chart(document.getElementById('chartCash'),{
    type:'bar',
    data:{labels:months,datasets:[
      {label:'Cash In',data:inflow,backgroundColor:'#047857'},
      {label:'Cash Out',data:outflow,backgroundColor:'#b91c1c'},
    ]},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{labels:{color:c.text}}},
      scales:{x:{ticks:{color:c.text},grid:{color:c.grid}},y:{ticks:{color:c.text,callback:v=>'₩'+(v/1000).toFixed(0)+'k'},grid:{color:c.grid}}}}
  });
}
function drawExpChart(){
  const byCat = {};
  data.expenses.forEach(e=>byCat[e.category]=(byCat[e.category]||0)+e.amount);
  const labels = Object.keys(byCat), vals = Object.values(byCat);
  const c = chartColors();
  if(chartExp) chartExp.destroy();
  if(!labels.length){ document.getElementById('chartExp').parentElement.innerHTML = '<div class="empty">No expenses yet</div>'; return; }
  chartExp = new Chart(document.getElementById('chartExp'),{
    type:'doughnut',
    data:{labels,datasets:[{data:vals,backgroundColor:c.palette}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom',labels:{color:c.text,font:{size:11}}}}}
  });
}
function drawSalesChart(){
  const labels = data.sales.map((s,i)=>`#${i+1} ${s.buyer.slice(0,12)}`);
  const rev = data.sales.map(s=>s.qty*s.pricePerUnit);
  const cost = data.sales.map(s=>{
    const it = data.inventory.find(i=>i.model===s.model);
    return s.qty * (it?it.costPerUnit:0);
  });
  const profit = rev.map((r,i)=>r-cost[i]);
  const c = chartColors();
  if(chartSales) chartSales.destroy();
  if(!labels.length){ document.getElementById('chartSales').parentElement.innerHTML='<div class="empty">No sales yet</div>'; return; }
  chartSales = new Chart(document.getElementById('chartSales'),{
    type:'bar',
    data:{labels,datasets:[
      {label:'Revenue',data:rev,backgroundColor:'#1e40af'},
      {label:'Profit',data:profit,backgroundColor:'#047857'}
    ]},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{labels:{color:c.text}}},
      scales:{x:{ticks:{color:c.text},grid:{color:c.grid}},y:{ticks:{color:c.text,callback:v=>'₩'+(v/1e6).toFixed(1)+'M'},grid:{color:c.grid}}}}
  });
}
function drawInvChart(){
  const labels = data.investors.map(i=>i.name);
  const vals = data.investors.map(i=>i.capital);
  const c = chartColors();
  if(chartInv) chartInv.destroy();
  if(!labels.length) return;
  chartInv = new Chart(document.getElementById('chartInv'),{
    type:'pie',
    data:{labels,datasets:[{data:vals,backgroundColor:c.palette}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom',labels:{color:c.text,font:{size:11}}}}}
  });
}

function saleSave(id){
  const obj = {
    id: id || uid(),
    date: document.getElementById('f_date').value,
    buyer: document.getElementById('f_buyer').value.trim(),
    model: document.getElementById('f_model').value,
    qty: +document.getElementById('f_qty').value || 0,
    pricePerUnit: +document.getElementById('f_price').value || 0,
    received: +document.getElementById('f_recv').value || 0,
    notes: document.getElementById('f_notes').value.trim(),
  };
  if(!obj.buyer||!obj.model||!obj.qty){ alert('Buyer, model and qty required'); return; }
  // Update inventory sold count
  const prev = id ? data.sales.find(x=>x.id===id) : null;
  if(prev){
    const prevItem = data.inventory.find(i=>i.model===prev.model);
    if(prevItem) prevItem.soldQty = Math.max(0, prevItem.soldQty - prev.qty);
  }
  const item = data.inventory.find(i=>i.model===obj.model);
  if(item) item.soldQty = (item.soldQty||0) + obj.qty;

  if(id){ const i = data.sales.findIndex(x=>x.id===id); data.sales[i]=obj; }
  else data.sales.push(obj);
  saveData(); closeModal(); route('sales');
}
function saleDel(id){
  if(!confirm('Delete this sale?')) return;
  const s = data.sales.find(x=>x.id===id);
  if(s){ const item = data.inventory.find(i=>i.model===s.model); if(item) item.soldQty = Math.max(0, item.soldQty - s.qty); }
  data.sales = data.sales.filter(x=>x.id!==id);
  saveData(); route('sales');
}

      <div class="card-header"><h3 class="card-title" style="color:var(--red)">Danger Zone</h3></div>
      <p class="muted" style="margin:0 0 12px;font-size:13px">Delete every record — inventory, sales, expenses, investors, everything.</p>
      <button class="btn btn-danger" onclick="resetAll()">Reset all data</button>
    </div>`;
};
function saveSettings(){
  data.settings.businessName = document.getElementById('s_biz').value.trim();
  data.settings.owner = document.getElementById('s_owner').value.trim();
  saveData(); alert('Saved');
}
function exportJSON(){
  const blob = new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `mobilehub-backup-${todayISO()}.json`; a.click();
  URL.revokeObjectURL(url);
}
function exportCSV(){
  const sections = [
    ['INVENTORY','id,model,brand,sku,qty,soldQty,costPerUnit,notes', data.inventory.map(x=>[x.id,x.model,x.brand,x.sku,x.qty,x.soldQty,x.costPerUnit,x.notes].map(csvCell).join(','))],
    ['SALES','id,date,buyer,model,qty,pricePerUnit,received,notes', data.sales.map(x=>[x.id,x.date,x.buyer,x.model,x.qty,x.pricePerUnit,x.received,x.notes].map(csvCell).join(','))],
    ['EXPENSES','id,date,category,amount,note', data.expenses.map(x=>[x.id,x.date,x.category,x.amount,x.note].map(csvCell).join(','))],
    ['CASHFLOW','id,date,type,source,amount,note', data.cashflow.map(x=>[x.id,x.date,x.type,x.source,x.amount,x.note].map(csvCell).join(','))],
    ['HAWALA','id,date,amountKRW,amountPKR,discountKRW,buyer,receiverName,receiverPhone,receivedBy,note', data.hawala.map(x=>[x.id,x.date,x.amountKRW,x.amountPKR,x.discountKRW,x.buyer,x.receiverName,x.receiverPhone,x.receivedBy,x.note].map(csvCell).join(','))],
    ['INVESTORS','id,name,contact,capitalPKR,capital,monthlyPayoutPKR,monthlyPayout,startDate,notes', data.investors.map(x=>[x.id,x.name,x.contact,x.capitalPKR,x.capital,x.monthlyPayoutPKR,x.monthlyPayout,x.startDate,x.notes].map(csvCell).join(','))],
    ['PAYOUTS','id,investorId,date,amountPKR,amount,note', data.payouts.map(x=>[x.id,x.investorId,x.date,x.amountPKR,x.amount,x.note].map(csvCell).join(','))],
  ];
  let csv = '';
  sections.forEach(([t,h,r])=>{ csv += `# ${t}\n${h}\n${r.join('\n')}\n\n`; });
  const blob = new Blob([csv],{type:'text/csv'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href=url; a.download=`mobilehub-data-${todayISO()}.csv`; a.click();
  URL.revokeObjectURL(url);
}
function csvCell(v){ v = (v===undefined||v===null)?'':String(v); return v.includes(',')||v.includes('"')||v.includes('\n') ? '"'+v.replace(/"/g,'""')+'"' : v; }
function importJSON(ev){
  const f = ev.target.files[0]; if(!f) return;
  const r = new FileReader();
  r.onload = () => {
    try{
      const parsed = JSON.parse(r.result);
      if(!confirm('This will REPLACE all current data. Continue?')) return;
      data = parsed; saveData(); route(currentPage); alert('Imported successfully');
    }catch(e){ alert('Invalid JSON file'); }
  };
  r.readAsText(f);
}
function resetAll(){
  if(!confirm('Delete ALL data? This cannot be undone. Consider exporting a backup first.')) return;
  if(!confirm('Are you absolutely sure?')) return;
  localStorage.removeItem(STORE_KEY);
  data = loadData(); route('dashboard');
}

// -------------------- EXCEL IMPORT / EXPORT --------------------
// Inventory: model, brand, sku, qty, soldQty, costPerUnit, notes
function xlsxInvTemplate(){
  const rows = [
    {model:'iPhone 15 Pro 256GB', brand:'Apple', sku:'IP15P-256', qty:10, soldQty:0, costPerUnit:1650000, notes:'Space Black'},
    {model:'Samsung S24 Ultra 512GB', brand:'Samsung', sku:'S24U-512', qty:5, soldQty:0, costPerUnit:1420000, notes:''},
  ];
  const ws = XLSX.utils.json_to_sheet(rows, {header:['model','brand','sku','qty','soldQty','costPerUnit','notes']});
  ws['!cols'] = [{wch:28},{wch:12},{wch:14},{wch:8},{wch:10},{wch:14},{wch:24}];
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Inventory');
  XLSX.writeFile(wb, `inventory-template.xlsx`);
}
function xlsxInvExport(){
  const rows = data.inventory.map(x=>({
    model:x.model, brand:x.brand||'', sku:x.sku||'',
    qty:x.qty, soldQty:x.soldQty, costPerUnit:x.costPerUnit,
    remaining: Math.max(0, x.qty-x.soldQty),
    stockValue: Math.max(0, x.qty-x.soldQty)*x.costPerUnit,
    notes:x.notes||''
  }));
  const ws = XLSX.utils.json_to_sheet(rows);
  ws['!cols'] = [{wch:28},{wch:12},{wch:14},{wch:8},{wch:8},{wch:14},{wch:10},{wch:14},{wch:24}];
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Inventory');
  XLSX.writeFile(wb, `inventory-${todayISO()}.xlsx`);
}
function xlsxInvImport(ev){
  const f = ev.target.files[0]; if(!f) return;
  const reader = new FileReader();
  reader.onload = e => {
    try{
      const wb = XLSX.read(e.target.result, {type:'array'});
      const ws = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(ws, {defval:''});
      if(!rows.length){ alert('The file has no data rows.'); return; }
      const mode = confirm(`Found ${rows.length} row(s).\n\nOK = APPEND to existing inventory\nCancel = REPLACE all inventory`);
      if(!mode){
        if(!confirm('Really REPLACE all inventory? Existing items will be deleted.')) { ev.target.value=''; return; }
        data.inventory = [];
      }
      let added=0, skipped=0;
      rows.forEach(r=>{
        const model = String(r.model||r.Model||'').trim();
        if(!model){ skipped++; return; }
        data.inventory.push({
          id: uid(),
          model,
          brand: String(r.brand||r.Brand||'').trim(),
          sku: String(r.sku||r.SKU||'').trim(),
          qty: Number(r.qty||r.Qty||r.quantity||0) || 0,
          soldQty: Number(r.soldQty||r.sold||0) || 0,
          costPerUnit: Number(r.costPerUnit||r.cost||r.price||0) || 0,
          notes: String(r.notes||r.Notes||'').trim(),
        });
        added++;
      });
      saveData();
      alert(`Imported ${added} item(s). ${skipped?skipped+' skipped (no model name).':''}`);
      ev.target.value='';
      route('inventory');
    }catch(err){
      alert('Could not read file. Make sure it is a valid .xlsx / .xls / .csv.\n\n'+err.message);
      ev.target.value='';
    }
  };
  reader.readAsArrayBuffer(f);
}

// Sales: date, buyer, model, qty, pricePerUnit, received, notes
function xlsxSalesTemplate(){
  const rows = [
    {date:todayISO(), buyer:'Ali Traders, Karachi', model:'iPhone 15 Pro 256GB', qty:5, pricePerUnit:1820000, received:0, notes:'Pending hawala'},
    {date:todayISO(), buyer:'Karim Mobiles, Lahore', model:'Samsung S24 Ultra 512GB', qty:3, pricePerUnit:1600000, received:0, notes:''},
  ];
  const ws = XLSX.utils.json_to_sheet(rows, {header:['date','buyer','model','qty','pricePerUnit','received','notes']});
  ws['!cols'] = [{wch:12},{wch:24},{wch:28},{wch:8},{wch:14},{wch:14},{wch:24}];
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Sales');
  XLSX.writeFile(wb, `sales-template.xlsx`);
}
function xlsxSalesExport(){
  const rows = data.sales.map(x=>{
    const total = x.qty*x.pricePerUnit;
    return {
      date:x.date, buyer:x.buyer, model:x.model, qty:x.qty,
      pricePerUnit:x.pricePerUnit, total, received:x.received||0,
      pending: Math.max(0, total-(x.received||0)),
      notes:x.notes||''
    };
  });
  const ws = XLSX.utils.json_to_sheet(rows);
  ws['!cols'] = [{wch:12},{wch:24},{wch:28},{wch:8},{wch:14},{wch:14},{wch:14},{wch:14},{wch:24}];
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Sales');
  XLSX.writeFile(wb, `sales-${todayISO()}.xlsx`);
}
function xlsxSalesImport(ev){
  const f = ev.target.files[0]; if(!f) return;
  const reader = new FileReader();
  reader.onload = e => {
    try{
      const wb = XLSX.read(e.target.result, {type:'array'});
      const ws = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(ws, {defval:''});
      if(!rows.length){ alert('The file has no data rows.'); return; }
      const mode = confirm(`Found ${rows.length} row(s).\n\nOK = APPEND to existing sales\nCancel = REPLACE all sales`);
      if(!mode){
        if(!confirm('Really REPLACE all sales? Existing sales will be deleted. (Inventory sold counts will be recalculated.)')) { ev.target.value=''; return; }
        // Roll back sold quantities from existing sales
        data.sales.forEach(s=>{
          const item = data.inventory.find(i=>i.model===s.model);
          if(item) item.soldQty = Math.max(0, (item.soldQty||0) - s.qty);
        });
        data.sales = [];
      }
      let added=0, skipped=0, warnings=[];
      rows.forEach(r=>{
        const buyer = String(r.buyer||r.Buyer||'').trim();
        const model = String(r.model||r.Model||'').trim();
        const qty = Number(r.qty||r.Qty||r.quantity||0) || 0;
        if(!buyer || !model || !qty){ skipped++; return; }
        let date = r.date || r.Date || todayISO();
        // Excel sometimes returns serial date numbers
        if(typeof date === 'number'){
          const d = XLSX.SSF.parse_date_code(date);
          if(d) date = `${d.y}-${String(d.m).padStart(2,'0')}-${String(d.d).padStart(2,'0')}`;
        } else {
          date = String(date).slice(0,10);
        }
        const sale = {
          id: uid(),
          date,
          buyer,
          model,
          qty,
          pricePerUnit: Number(r.pricePerUnit||r.price||r.Price||0) || 0,
          received: Number(r.received||r.Received||0) || 0,
          notes: String(r.notes||r.Notes||'').trim(),
        };
        data.sales.push(sale);
        // Update inventory sold count (warn if model not found)
        const item = data.inventory.find(i=>i.model===model);
        if(item) item.soldQty = (item.soldQty||0) + qty;
        else if(warnings.length<3) warnings.push(model);
        added++;
      });
      saveData();
      let msg = `Imported ${added} sale(s). ${skipped?skipped+' skipped (missing buyer/model/qty). ':''}`;
      if(warnings.length) msg += `\n\nNote: these models aren't in your inventory yet — they were saved but no stock was deducted: ${warnings.join(', ')}${warnings.length>=3?'...':''}`;
      alert(msg);
      ev.target.value='';
      route('sales');
    }catch(err){
      alert('Could not read file. Make sure it is a valid .xlsx / .xls / .csv.\n\n'+err.message);
      ev.target.value='';
    }
  };
  reader.readAsArrayBuffer(f);
}

route('dashboard');
